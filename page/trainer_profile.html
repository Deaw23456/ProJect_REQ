<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../src/style.css">
    <title>Trainer Profile</title>
</head>

<body class="bg-[#0a0a0b] text-white font-sans flex flex-col h-screen overflow-hidden">
    <div class="fixed inset-0 z-[-1] pointer-events-none overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-[#ff8c00]/10 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-5%] w-[400px] h-[400px] bg-[#ff8c00]/10 blur-[100px] rounded-full"></div>
    </div>

    <header class="bg-white/5 backdrop-blur-md border-b border-white/10 pb-4 mb-5 sticky top-0 z-50">
        <nav class="flex items-center justify-between px-6 py-2">
            <div class="flex-shrink-0">
                <a href="/index.html" class="text-white text-4xl font-bold flex mt-2">Gym<div
                        class="text-black bg-[#ff8c00] rounded-md px-1 ml-0.5">Hub</div></a>
            </div>

            <div class="relative w-full max-w-md ml-auto flex items-center justify-end mr-5">
                <input type="search" name="search" id="search-input"
                    class="block w-full p-2 pr-10 text-white bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:border-[#ff8c00]/50 focus:bg-white/10 transition-all backdrop-blur-sm"
                    placeholder="Search">
                <div class="absolute inset-y-0 right-0 flex items-center pr-3 cursor-pointer">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>

            <div id="guest-nav">
                <ul class="flex gap-2 font-bold mt-2">
                    <li><a href="./singup.html"
                            class="text-white hover:bg-[#ff8c00] hover:text-black border border-[#ff8c00] rounded-lg px-4 py-2 transition-all shadow-[0_0_10px_rgba(255,140,0,0.2)]">Sign
                            up</a></li>
                    <li><a href="./login.html"
                            class="text-black bg-[#ff8c00] hover:bg-white hover:shadow-[0_0_15px_rgba(255,255,255,0.4)] rounded-lg px-6 py-2 transition-all">Login</a>
                    </li>
                </ul>
            </div>

            <div id="user-nav"
                class="hidden relative bg-white/5 backdrop-blur-md border border-[#ff8c00]/50 rounded-xl px-4 py-2 items-center gap-2 transition-all duration-300 cursor-pointer hover:scale-105 hover:bg-white/10 hover:shadow-[0_0_15px_rgba(255,140,0,0.3)] mt-2">
                <div class="flex items-center gap-2.5">
                    <img id="nav-profile-img" src="../img/Image-11 สำเนา.jpg" alt="User"
                        class="w-8 h-8 rounded-full object-cover border-2 border-[#ff8c00]">
                    <button id="profile-btn" type="button" class="flex items-center gap-2 text-white font-bold">
                        <span id="username-display"></span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7">
                            </path>
                        </svg>
                    </button>
                    <div id="dropdown-menu"
                        class="hidden absolute right-0 top-full mt-3 w-48 bg-[#1a1a1c]/90 backdrop-blur-xl border border-white/10 rounded-xl shadow-2xl py-2 z-20">
                        <a href="./main_profile.html"
                            class="block px-4 py-2 text-sm text-white hover:bg-[#ff8c00] hover:text-black transition-colors">My
                            Profile</a>
                        <a href="/index.html" id="logout-btn"
                            class="block px-4 py-2 text-sm text-red-400 hover:bg-red-500 hover:text-white transition-colors">Logout</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="flex flex-1 overflow-hidden p-6 gap-6 max-w-7xl mx-auto w-full">
        <aside class="w-72 bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl flex flex-col h-full p-6 shrink-0 shadow-xl">
            <div class="flex items-center gap-4 mb-8">
                <h2 class="text-2xl font-black italic uppercase tracking-tighter">Trainer Menu</h2>
            </div>
            
            <nav class="space-y-3 flex-1">
                <a href="./trainer_dashboard.html" class="flex items-center gap-3 px-4 py-3.5 rounded-xl text-gray-400 hover:bg-white/10 hover:text-white transition-all font-bold group">
                    <svg class="w-5 h-5 group-hover:text-[#ff8c00] transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                    <span>Dashboard</span>
                </a>
                
                <a href="./trainer_profile.html" class="flex items-center gap-3 px-4 py-3.5 rounded-xl bg-white/10 text-white transition-all font-bold border-l-4 border-[#ff8c00] shadow-md">
                    <svg class="w-5 h-5 text-[#ff8c00]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <span>My Profile</span>
                </a>

                <a href="./manage_packages.html" class="flex items-center gap-3 px-4 py-3.5 rounded-xl text-gray-400 hover:bg-white/10 hover:text-[#ff8c00] transition-all font-bold group">
                    <svg class="w-5 h-5 group-hover:text-[#ff8c00] transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span>My Packages</span>
                </a>
            </nav>

            <div class="mt-auto">
                <div class="bg-white/5 border border-white/10 rounded-2xl p-4 mb-3">
                    <div id="trainer_profile" class="flex items-center">
                        <img id="trainer-profile-img" src="../img/Image-11 สำเนา.jpg" alt="Trainer Profile" class="w-10 h-10 rounded-full object-cover border-2 border-[#ff8c00]">
                        <div class="ml-3">
                            <p id="trainer-profile-name" class="font-bold text-white text-sm">Trainer Name</p>
                            <p id="trainer-profile-position" class="text-[10px] text-gray-400 uppercase tracking-widest mt-0.5">Trainer</p>
                        </div>
                    </div>
                </div>
                <div id="sidebar-logout-btn" class="bg-white/5 border border-white/10 p-3 w-full flex items-center justify-center cursor-pointer rounded-2xl duration-300 transition-all hover:bg-red-500/20 hover:border-red-500/50 group">
                    <svg class="w-5 h-5 mr-1.5 group-hover:text-red-500 text-gray-400 transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span class="font-bold text-gray-400 group-hover:text-red-500 transition-colors text-sm">Logout</span>
                </div>
            </div>
        </aside>

        <div class="flex-1 overflow-y-auto pr-2 scroll-custom">
            <div class="relative w-full h-72 rounded-[2rem] overflow-hidden mb-[-90px] border border-white/10 shadow-2xl">
                <img id="trainer-bg-img" src="../img/gym hub-2 สำเนา.png" alt="Background" class="w-full h-full object-cover brightness-75">
                <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0b] via-[#0a0a0b]/40 to-transparent"></div>
            </div>

            <div class="relative flex items-end gap-6 px-10">
                <div class="w-44 h-44 rounded-full border-4 border-[#ff8c00] bg-[#181819] p-1.5 overflow-hidden shadow-[0_0_30px_rgba(255,140,0,0.3)]">
                    <img id="trainer-main-profile-img" src="../img/gym hub-2 สำเนา.png" alt="Profile" class="w-full h-full object-cover rounded-full">
                </div>
                <div class="mb-4">
                    <h1 id="trainer-display-name" class="text-5xl font-black italic uppercase tracking-tighter drop-shadow-lg">Trainer Name</h1>
                    <div class="flex items-center gap-3 mt-2">
                        <p id="trainer-display-position" class="text-lg font-bold text-[#ff8c00] tracking-widest uppercase">Trainer</p>
                        <span class="w-1.5 h-1.5 rounded-full bg-gray-600"></span>
                        <span class="text-sm font-medium text-gray-400 flex items-center gap-1">
                            <svg class="w-4 h-4 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                            4.9 (120 Reviews)
                        </span>
                    </div>
                </div>
            </div>
            
            <section class="bg-[#151517] border border-gray-800 rounded-[2.5rem] p-10 mt-12 shadow-xl mb-10">
                <div class="flex justify-between items-center mb-8 pb-4 border-b border-gray-800">
                    <h2 class="text-xl font-black text-white uppercase tracking-widest flex items-center gap-3">
                        <span class="w-2 h-8 bg-[#ff8c00] rounded-full"></span>
                        About Me
                    </h2>
                    <span id="trainer-posi-update" class="font-bold bg-[#ff8c00]/10 border border-[#ff8c00]/30 text-[#ff8c00] px-4 py-1.5 rounded-full text-xs uppercase tracking-widest">Active</span>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-6">
                    <div class="flex flex-col">
                        <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Username</span>
                        <span id="trainer-show-username" class="font-bold text-lg text-white">-</span>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Full Name</span>
                        <span id="trainer-show-fullname" class="font-bold text-lg text-white">-</span>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Email</span>
                        <span id="trainer-show-email" class="font-bold text-white">-</span>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Phone</span>
                        <span id="trainer-show-phone" class="font-bold text-[#ff8c00]">-</span>
                    </div>
                    
                    <div class="md:col-span-2 grid grid-cols-3 gap-4 mt-4 bg-black/30 p-6 rounded-2xl border border-gray-800/50">
                        <div class="flex flex-col items-center justify-center border-r border-gray-800">
                            <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Age</span>
                            <span id="trainer-show-age" class="font-black text-2xl text-white">-</span>
                        </div>
                        <div class="flex flex-col items-center justify-center border-r border-gray-800">
                            <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Weight</span>
                            <span id="trainer-show-weight" class="font-black text-2xl text-white">- <span class="text-sm text-gray-500 font-bold">kg</span></span>
                        </div>
                        <div class="flex flex-col items-center justify-center">
                            <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Height</span>
                            <span id="trainer-show-height" class="font-black text-2xl text-white">- <span class="text-sm text-gray-500 font-bold">cm</span></span>
                        </div>
                    </div>

                    <div class="flex flex-col md:col-span-2 mt-2">
                        <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Gender</span>
                        <span id="trainer-show-gender" class="font-bold text-white">-</span>
                    </div>
                    <div class="flex flex-col md:col-span-2">
                        <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Position</span>
                        <span id="trainer-show-position" class="font-bold text-[#ff8c00]">-</span>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <style>
        .scroll-custom::-webkit-scrollbar { width: 5px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .scroll-custom:hover::-webkit-scrollbar-thumb { background: #ff8c00; }
    </style>

    <script src="../dist/js/helpers.js"></script>
    <script src="../dist/js/nav.js"></script>
    <script src="../dist/js/trainer_profile.js"></script>
</body>

</html>
