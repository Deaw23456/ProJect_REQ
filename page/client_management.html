<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../src/style.css" rel="stylesheet"> <title>Gym Hub - Client Management</title>
</head>
<body class="bg-[#181819] text-white min-h-screen p-4 md:p-8">

    <div class="flex justify-between items-center mb-10">
        <div>
            <a href="trainer_dashboard.html" class="text-orange-500 hover:text-white transition-all text-sm">← Back to Dashboard</a>
            <h1 class="text-3xl font-bold mt-2">Client Management</h1>
        </div>
        <button class="bg-orange-500 text-black font-bold py-2 px-6 rounded-lg hover:bg-white transition-all">
            + Add New Client
        </button>
    </div>

    <div class="bg-[#1f1f20] rounded-2xl border border-gray-800 overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-[#2a2a2b] text-gray-400 uppercase text-xs">
                <tr>
                    <th class="px-6 py-4">Client</th>
                    <th class="px-6 py-4">Status</th>
                    <th class="px-6 py-4">Program</th>
                    <th class="px-6 py-4 text-right">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-800">
                <tr class="hover:bg-[#252526] transition-colors">
                    <td class="px-6 py-4 flex items-center gap-3">
                        <img src="../img/pho_member.png" class="w-10 h-10 rounded-full object-cover" alt="Client">
                        <div>
                            <p class="font-bold">BallKonlhor_02</p>
                            <p class="text-xs text-gray-500">ball_member@email.com</p>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-sm">
                        <span class="bg-green-500/10 text-green-500 px-2 py-1 rounded-full text-[10px] font-bold uppercase">Active</span>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-400">Weight Loss v.1</td>
                    <td class="px-6 py-4 text-right">
                        <button class="text-orange-500 hover:underline text-sm font-bold mr-4">Edit</button>
                        <button class="text-gray-500 hover:text-white text-sm">View Details</button>
                    </td>
                </tr>
                
                </tbody>
        </table>
    </div>

</body>
</html>
