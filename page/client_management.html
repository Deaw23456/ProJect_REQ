<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../src/style.css" rel="stylesheet">
    <title>Client Management</title>
</head>

<body class="bg-[#0a0a0b] text-white min-h-screen relative">
    <div class="fixed inset-0 z-[-1] pointer-events-none overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-[#ff8c00]/10 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-5%] w-[400px] h-[400px] bg-[#ff8c00]/10 blur-[100px] rounded-full"></div>
        <div class="absolute top-[40%] left-[50%] w-[300px] h-[300px] bg-white/5 blur-[80px] rounded-full"></div>
    </div>

    <header class="bg-white/5 backdrop-blur-md border-b border-white/10 pb-4 mb-5 sticky top-0 z-50 items-center">
        <nav class="flex items-center justify-between px-6 py-2">
            <div class="flex-shrink-0">
                <a href="/index.html" class="text-white text-4xl font-bold flex mt-2">Gym<div
                        class="text-black bg-[#ff8c00] rounded-md px-1 ml-0.5">Hub</div></a>
            </div>

            <div class="relative w-full max-w-md ml-auto flex items-center justify-end mr-5">
                <input type="search" name="search" id="search-input"
                    class="block w-full p-2 pr-10 text-white bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:border-[#ff8c00]/50 focus:bg-white/10 transition-all backdrop-blur-sm"
                    placeholder="Search">
                <div class="absolute inset-y-0 right-0 flex items-center pr-3 cursor-pointer">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>

            <div id="guest-nav">
                <ul class="flex gap-2 font-bold mt-2">
                    <li><a href="/page/singup.html"
                            class="text-white hover:bg-[#ff8c00] hover:text-black border border-[#ff8c00] rounded-lg px-4 py-2 transition-all shadow-[0_0_10px_rgba(255,140,0,0.2)]">Sign
                            up</a></li>
                    <li><a href="/page/login.html"
                            class="text-black bg-[#ff8c00] hover:bg-white hover:shadow-[0_0_15px_rgba(255,255,255,0.4)] rounded-lg px-6 py-2 transition-all">Login</a>
                    </li>
                </ul>
            </div>

            <div id="user-nav"
                class="hidden relative bg-white/5 backdrop-blur-md border border-[#ff8c00]/50 rounded-xl px-4 py-2 items-center gap-2 transition-all duration-300 cursor-pointer hover:scale-105 hover:bg-white/10 hover:shadow-[0_0_15px_rgba(255,140,0,0.3)] mt-2">
                <div class="flex items-center gap-2.5">
                    <img id="nav-profile-img" src="/img/Image-11 สำเนา.jpg" alt="User"
                        class="w-8 h-8 rounded-full object-cover border-2 border-[#ff8c00]">
                    <button id="profile-btn" type="button" class="flex items-center gap-2 text-white font-bold">
                        <span id="username-display"></span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7">
                            </path>
                        </svg>
                    </button>
                    <div id="dropdown-menu"
                        class="hidden absolute right-0 top-full mt-3 w-48 bg-[#1a1a1c]/90 backdrop-blur-xl border border-white/10 rounded-xl shadow-2xl py-2 z-20">
                        <a href="/page/main_profile.html"
                            class="block px-4 py-2 text-sm text-white hover:bg-[#ff8c00] hover:text-black transition-colors rounded-lg">My
                            Profile</a>
                        <a href="#" id="logout-btn"
                            class="block px-4 py-2 text-sm text-red-400 hover:bg-red-500 hover:text-white transition-colors rounded-lg">Logout</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main class="p-4">
        <div class="flex justify-between items-center mb-10">
            <button class="bg-orange-500 text-black font-bold py-2 px-6 rounded-lg hover:bg-white transition-all">
                + Add New Client
            </button>
        </div>

        <div class="bg-white/5 backdrop-blur-xl rounded-2xl border border-white/10 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-white/5 text-gray-400 uppercase text-xs border-b border-white/10">
                    <tr>
                        <th class="px-6 py-4">Client</th>
                        <th class="px-6 py-4">Status</th>
                        <th class="px-6 py-4">Program</th>
                        <th class="px-6 py-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-white/10">
                    <tr class="hover:bg-white/5 transition-colors">
                        <td class="px-6 py-4 flex items-center gap-3">
                            <img src="../img/pho_member.png" class="w-10 h-10 rounded-full object-cover" alt="Client">
                            <div>
                                <p class="font-bold">BallKonlhor_02</p>
                                <p class="text-xs text-gray-500">ball_member@email.com</p>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-sm">
                            <span
                                class="bg-green-500/10 text-green-500 px-2 py-1 rounded-full text-[10px] font-bold uppercase">Active</span>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-400">Weight Loss v.1</td>
                        <td class="px-6 py-4 text-right">
                            <button class="text-orange-500 hover:underline text-sm font-bold mr-4">Edit</button>
                            <button class="text-gray-500 hover:text-white text-sm">View Details</button>
                        </td>
                    </tr>

                </tbody>
            </table>
        </div>
    </main>
    <script src="../dist/js/helpers.js"></script>
    <script src="../dist/js/nav.js"></script>
    <script src="../dist/js/client_management.js"></script>
</body>
</html>
