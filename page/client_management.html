<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../src/style.css" rel="stylesheet">
    <title>Client Management</title>
</head>

<body class="bg-[#181819] text-white min-h-screen">
    <header class="bg-white/5 backdrop-blur-md border-b border-white/10 pb-4 mb-5 sticky top-0 z-50">
        <nav class="flex items-center justify-between px-6 py-2">
            <div class="flex-shrink-0">
                <a href="./trainer_dashboard.html" class="text-white text-4xl font-bold flex mt-2">Gym<div
                        class="text-black bg-[#ff8c00] rounded-md px-1 ml-0.5">Hub</div></a>
            </div>
            <div class="relative w-full max-w-md ml-auto flex items-center justify-end mr-5">
                <input type="search" placeholder="Search" class="block w-full p-2 pr-10 text-white bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:border-[#ff8c00]/50 transition-all backdrop-blur-sm">
            </div>

            <div id="guest-nav">
                <ul class="flex gap-2 font-bold mt-2">
                    <li><a href="./singup.html"
                            class="text-white hover:bg-[#ff8c00] hover:text-black border border-[#ff8c00] rounded-lg px-4 py-2 transition-all shadow-[0_0_10px_rgba(255,140,0,0.2)]">Sign
                            up</a></li>
                    <li><a href="./login.html"
                            class="text-black bg-[#ff8c00] hover:bg-white hover:shadow-[0_0_15px_rgba(255,255,255,0.4)] rounded-lg px-6 py-2 transition-all">Login</a>
                    </li>
                </ul>
            </div>

            <div id="user-nav"
                class="hidden relative bg-white/5 backdrop-blur-md border border-[#ff8c00]/50 rounded-xl px-4 py-2 items-center gap-2 transition-all duration-300 cursor-pointer hover:scale-105 hover:bg-white/10 hover:shadow-[0_0_15px_rgba(255,140,0,0.3)] mt-2">
                <div class="flex items-center gap-2.5">
                    <img id="nav-profile-img" src="../img/Image-11 สำเนา.jpg" alt="User"
                        class="w-8 h-8 rounded-full object-cover border-2 border-[#ff8c00]">
                    <button id="profile-btn" type="button" class="flex items-center gap-2 text-white font-bold">
                        <span id="username-display"></span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7">
                            </path>
                        </svg>
                    </button>
                    <div id="dropdown-menu"
                        class="hidden absolute right-0 top-full mt-3 w-48 bg-[#1a1a1c]/90 backdrop-blur-xl border border-white/10 rounded-xl shadow-2xl py-2 z-20">
                        <a href="./main_profile.html"
                            class="block px-4 py-2 text-sm text-white hover:bg-[#ff8c00] hover:text-black transition-colors">My
                            Profile</a>
                        <a href="#" id="logout-btn"
                            class="block px-4 py-2 text-sm text-red-400 hover:bg-red-500 hover:text-white transition-colors">Logout</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-10">
            <h1 class="text-4xl font-black italic uppercase tracking-tighter mb-2 text-white drop-shadow-lg">Client Overview</h1>
            <p class="text-gray-400 font-bold tracking-wide text-sm">ดูรายชื่อ ติดตามสถิติ และจัดการลูกค้าที่เรียนจบคอร์ส</p>
        </div>

        <div class="bg-[#151517] rounded-3xl border border-gray-800 overflow-hidden shadow-2xl">
            <table class="w-full text-left border-collapse">
                <thead class="bg-[#1f1f22] text-gray-400 uppercase text-xs tracking-widest">
                    <tr>
                        <th class="px-6 py-5 font-black">Client</th>
                        <th class="px-6 py-5 font-black">Status</th>
                        <th class="px-6 py-5 font-black">Program</th>
                        <th class="px-6 py-5 font-black text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="client-table-body" class="divide-y divide-gray-800/50">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="stats-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm transition-opacity duration-300 opacity-0 px-4">
        <div class="bg-[#1a1a1c] border border-[#ff8c00]/50 p-8 rounded-[2rem] shadow-[0_0_40px_rgba(255,140,0,0.2)] max-w-sm w-full transform scale-90 transition-transform duration-300 text-center" id="stats-modal-content">
            
            <div class="w-20 h-20 mx-auto rounded-full border-2 border-[#ff8c00] p-1 shadow-lg mb-4">
                <img id="stats-img" src="" class="w-full h-full rounded-full object-cover" alt="Client">
            </div>
            
            <h2 id="stats-name" class="text-2xl font-black text-white uppercase italic tracking-wide mb-1">Name</h2>
            <p id="stats-program" class="text-[#ff8c00] font-bold text-sm mb-6">Program Name</p>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-[#252528] p-4 rounded-2xl border border-gray-700">
                    <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest mb-1">Sessions</p>
                    <p class="text-3xl font-black text-white">4<span class="text-sm text-gray-500">/10</span></p>
                </div>
                <div class="bg-[#252528] p-4 rounded-2xl border border-gray-700">
                    <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest mb-1">Current Wt.</p>
                    <p class="text-3xl font-black text-white">72<span class="text-sm text-gray-500">kg</span></p>
                </div>
            </div>

            <button onclick="closeStatsModal()" class="w-full bg-white text-black font-black py-3 rounded-xl hover:bg-[#ff8c00] transition-all transform active:scale-95 uppercase tracking-widest text-sm">Close Details</button>
        </div>
    </div>

    <script src="../dist/js/helpers.js"></script>
    <script src="../dist/js/nav.js"></script>
    <script>
        // 1. ฐานข้อมูลจำลองรายชื่อลูกค้า (🎯 เพิ่มฟิลด์ img เข้าไป)
        let clientsData = [
            { 
                name: "BallKhonlhor_02", 
                email: "ball_member@email.com", 
                program: "Weight Loss v.1", 
                status: "ACTIVE",
                img: "../img/pho_member.png" // รูปคนที่ 1
            },
            { 
                name: "John Muscle", 
                email: "john.m@email.com", 
                program: "Pro Transformation", 
                status: "ACTIVE",
                img: "../img/mem2.jpg" // รูปคนที่ 2 (ฝากเป็นลิงก์ไว้ให้ คุณแก้เป็นพาทในเครื่องได้เลย)
            }
        ];

        // 2. ฟังก์ชันวาดตาราง
        function renderClients() {
            const tbody = document.getElementById('client-table-body');
            tbody.innerHTML = '';

            // กรณีไม่มีลูกค้าเหลือเลย
            if (clientsData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-10 text-gray-500 italic">ไม่พบรายชื่อลูกค้าในระบบ</td></tr>`;
                return;
            }

            clientsData.forEach((client, index) => {
                const statusColor = client.status === 'ACTIVE' ? 'bg-green-500/10 text-green-500' : 'bg-red-500/10 text-red-500';
                
                const tr = document.createElement('tr');
                tr.className = "hover:bg-[#252528] transition-colors group";
                
                // 🎯 เปลี่ยน src เป็น ${client.img} เพื่อดึงรูปของแต่ละคน
                tr.innerHTML = `
                    <td class="px-6 py-5 flex items-center gap-4">
                        <img src="${client.img}" class="w-12 h-12 rounded-full object-cover border border-gray-700" alt="Client">
                        <div>
                            <p class="font-bold text-white text-lg">${client.name}</p>
                            <p class="text-xs text-gray-500 font-medium">${client.email}</p>
                        </div>
                    </td>
                    <td class="px-6 py-5">
                        <span class="${statusColor} px-3 py-1.5 rounded-full text-[10px] font-black uppercase tracking-wider">${client.status}</span>
                    </td>
                    <td class="px-6 py-5 text-sm text-[#ff8c00] font-bold">${client.program}</td>
                    <td class="px-6 py-5 text-right flex justify-end gap-2">
                        <button onclick="openStatsModal(${index})" class="bg-[#252528] border border-gray-700 hover:border-[#ff8c00] text-[#ff8c00] px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider transition-all shadow-md">View Details</button>
                        <button onclick="deleteClient(${index})" class="bg-[#252528] border border-gray-700 hover:border-red-500 hover:bg-red-500/10 text-red-500 px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider transition-all shadow-md">Remove</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // ลบลูกค้า
        function deleteClient(index) {
            const clientName = clientsData[index].name;
            if(confirm(`คุณแน่ใจหรือไม่ว่าต้องการลบรายชื่อ "${clientName}" ออกจากระบบ? (การกระทำนี้ไม่สามารถย้อนกลับได้)`)) {
                clientsData.splice(index, 1); 
                renderClients(); 
            }
        }

        // --- การจัดการ Modal View Details ---
        const statsModal = document.getElementById('stats-modal');
        const statsModalContent = document.getElementById('stats-modal-content');

        function openStatsModal(index) {
            const client = clientsData[index];
            
            // 🎯 เปลี่ยนรูป, ชื่อ, โปรแกรม ใน Modal ตามข้อมูลที่กด
            document.getElementById('stats-img').src = client.img; 
            document.getElementById('stats-name').innerText = client.name;
            document.getElementById('stats-program').innerText = client.program || "No Program Assigned";

            statsModal.classList.remove('hidden');
            setTimeout(() => {
                statsModal.classList.remove('opacity-0');
                statsModal.classList.add('opacity-100');
                statsModalContent.classList.remove('scale-90');
                statsModalContent.classList.add('scale-100');
            }, 10);
        }

        function closeStatsModal() {
            statsModal.classList.remove('opacity-100');
            statsModal.classList.add('opacity-0');
            statsModalContent.classList.remove('scale-100');
            statsModalContent.classList.add('scale-90');
            setTimeout(() => statsModal.classList.add('hidden'), 300);
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderClients();
        });

    </script>
</body>
</html>
