<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../src/style.css" rel="stylesheet">
    <title>Gym Hub - Availability</title>
    <style>
        /* บังคับหน้าจอสูง 100vh และจัดการ Scrollbar */
        html, body { height: 100vh; margin: 0; overflow: hidden; background-color: #121212; }
        .scroll-custom::-webkit-scrollbar { width: 4px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #FF6600; border-radius: 10px; }
        
        /* สไตล์แท็บที่ถูกเลือก */
        .tab-active { background-color: #1f1f20; border-left: 4px solid #FF6600; color: white !important; font-weight: bold; }
    </style>
</head>
<body class="text-white font-sans flex h-screen w-full">

    <aside class="w-72 border-r border-gray-800 flex flex-col bg-[#181819] shadow-2xl h-full p-6 z-10">
        <div class="flex items-center gap-4 mb-10">
            <a href="trainer_dashboard.html" class="bg-[#FF6600] text-white rounded-full w-10 h-10 flex items-center justify-center font-bold hover:scale-110 transition-all shadow-lg shadow-[#FF6600]/20">←</a>
            <h2 class="text-2xl font-black italic uppercase tracking-tighter">Schedules</h2>
        </div>

        <nav id="day-tabs" class="space-y-2 flex-1 overflow-y-auto scroll-custom">
            </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full bg-[#121212] relative">
        <div class="flex-1 overflow-y-auto p-12 scroll-custom">
            <div class="max-w-5xl mx-auto w-full">
                
                <div class="mb-10">
                    <p class="text-[12px] text-[#FF6600] font-black uppercase tracking-[0.4em] mb-2">Availability Settings</p>
                    <h1 id="current-day-display" class="text-6xl font-black italic uppercase tracking-tighter">MONDAY</h1>
                    <div class="h-1.5 w-24 bg-[#FF6600] mt-4 rounded-full shadow-[0_0_10px_#FF6600]"></div>
                </div>

                <div id="time-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                    </div>

            </div>
        </div>

        <footer class="p-8 border-t border-gray-800 flex justify-end px-16 bg-[#121212]/90 backdrop-blur-sm">
            <button onclick="saveAvailability()" class="bg-[#FF6600] text-white font-black py-4 px-12 rounded-xl shadow-[0_0_20px_rgba(255,102,0,0.3)] hover:bg-white hover:text-black hover:shadow-white/30 transition-all transform active:scale-95 text-lg uppercase tracking-wide">
                Save Availability
            </button>
        </footer>
    </main>

    <script>
        // 1. กำหนดตัวแปรข้อมูล (State)
        const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        const allTimeSlots = [
            "08:00", "09:00", "10:00", "11:00", "12:00", 
            "13:00", "14:00", "15:00", "16:00", "17:00", 
            "18:00", "19:00", "20:00", 
        ];
        
        let currentDay = 'Monday';
        
        // จำลองข้อมูลที่มีอยู่แล้ว (หรือถ้าเริ่มใหม่ก็ปล่อยเป็น Array ว่างได้เลย)
        let availabilityState = {
            Monday: ["09:00", "10:00", "17:00", "18:00"],
            Tuesday: ["13:00", "14:00", "15:00"],
            Wednesday: [],
            Thursday: ["08:00", "09:00", "10:00"],
            Friday: ["18:00", "19:00", "20:00"],
            Saturday: ["10:00", "11:00"],
            Sunday: []
        };

        // 2. ฟังก์ชันเริ่มทำงานตอนเปิดหน้า
        function init() {
            renderTabs();
            renderTimeSlots();
        }

        // 3. เรนเดอร์แท็บเมนูด้านซ้าย
        function renderTabs() {
            const tabsContainer = document.getElementById('day-tabs');
            tabsContainer.innerHTML = '';
            
            days.forEach(day => {
                const btn = document.createElement('button');
                const isActive = day === currentDay;
                
                // กำหนดคลาส Tailwind ตามสถานะ
                btn.className = `w-full p-4 rounded-xl text-left uppercase transition-all ${
                    isActive 
                    ? 'tab-active' 
                    : 'text-gray-500 hover:text-white hover:bg-[#1f1f20]'
                }`;
                btn.innerText = day;
                btn.onclick = () => switchDay(day);
                
                tabsContainer.appendChild(btn);
            });
        }

        // 4. สลับวัน
        function switchDay(day) {
            currentDay = day;
            document.getElementById('current-day-display').innerText = day;
            renderTabs();
            renderTimeSlots();
        }

        // 5. เรนเดอร์กล่องเวลา (พร้อมเช็ค Conditional Styling)
        function renderTimeSlots() {
            const gridContainer = document.getElementById('time-grid');
            gridContainer.innerHTML = '';
            
            const selectedSlots = availabilityState[currentDay];

            allTimeSlots.forEach(time => {
                const isAvailable = selectedSlots.includes(time);
                const btn = document.createElement('button');
                
                // 💡 ทริค Tailwind: Conditional Styling ตรงนี้แหละ!
                const baseClasses = "py-6 rounded-2xl font-black text-xl transition-all transform active:scale-95 duration-200 border";
                const activeClasses = "bg-[#FF6600] text-white border-[#FF6600] shadow-[0_0_15px_rgba(255,102,0,0.4)]";
                const inactiveClasses = "bg-gray-800 text-gray-400 border-gray-700 hover:bg-gray-700 hover:text-white";

                btn.className = `${baseClasses} ${isAvailable ? activeClasses : inactiveClasses}`;
                btn.innerText = time;
                
                // ผูก Event Toggle
                btn.onclick = () => toggleTimeSlot(time);
                
                gridContainer.appendChild(btn);
            });
        }

        // 6. ฟังก์ชัน Toggle (เพิ่ม/ลบ เวลาออกจาก State)
        function toggleTimeSlot(time) {
            const selectedSlots = availabilityState[currentDay];
            
            if (selectedSlots.includes(time)) {
                // ถ้ามีอยู่แล้วให้เอาออก (Unavailable)
                availabilityState[currentDay] = selectedSlots.filter(t => t !== time);
            } else {
                // ถ้ายังไม่มีให้เพิ่มเข้าไป (Available)
                availabilityState[currentDay].push(time);
            }
            
            // สั่งให้วาดกล่องเวลาใหม่เพื่ออัปเดตสี
            renderTimeSlots();
        }

        // 7. ฟังก์ชัน Save
        function saveAvailability() {
            console.log("Saving Data to Database/LocalStorage:", availabilityState);
            alert("ตารางงานถูกบันทึกเรียบร้อยแล้ว! (เช็คข้อมูลที่ Console)");
            // ตรงนี้สามารถเอา availabilityState ไปเก็บลง localStorage หรือยิง API ต่อได้เลย
        }

        // เรียกใช้งานครั้งแรก
        init();
    </script>
</body>
</html>
