<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../src/style.css" rel="stylesheet">
    <title>Gym Hub - Progress Tracker</title>
    <style>
        html, body { height: 100vh; margin: 0; overflow: hidden; background-color: #0d0d0f; }
        .scroll-custom::-webkit-scrollbar { width: 4px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #ff8c00; border-radius: 10px; }
        .check-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="text-white font-sans relative overflow-x-hidden flex flex-col h-screen">

    <div class="relative w-full shrink-0">
        <div class="absolute inset-0 z-0 pointer-events-none">
            <img src="../img/Gym-bg.png" 
                class="w-full h-full object-cover opacity-20" alt="Gym Background">
            
            <div class="absolute inset-0 bg-gradient-to-t from-[#0d0d0f] via-[#0d0d0f]/80 to-transparent"></div>
            
            <div class="absolute bottom-0 inset-x-0 h-24 bg-gradient-to-t from-[#0d0d0f] to-transparent"></div>
        </div>
        <div class="absolute inset-0 z-[-1] pointer-events-none overflow-hidden">
            <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-[#ff8c00]/10 blur-[120px] rounded-full"></div>
            <div class="absolute bottom-[-10%] right-[-5%] w-[400px] h-[400px] bg-[#ff8c00]/10 blur-[100px] rounded-full"></div>
        </div>

    <header class="bg-white/5 backdrop-blur-md border-b border-white/10 pb-4 mb-5 sticky top-0 z-50 items-center">
        <nav class="flex items-center justify-between px-6 py-2">
            <div class="flex-shrink-0">
                <a href="./trainer_dashboard.html" class="text-white text-4xl font-bold flex mt-2">Gym<div
                        class="text-black bg-[#ff8c00] rounded-md px-1 ml-0.5">Hub</div></a>
            </div>

            <div class="relative w-full max-w-md ml-auto flex items-center justify-end mr-5">
                <input type="search" name="search" id="search-input"
                    class="block w-full p-2 pr-10 text-white bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:border-[#ff8c00]/50 focus:bg-white/10 transition-all backdrop-blur-sm"
                    placeholder="Search">
                <div class="absolute inset-y-0 right-0 flex items-center pr-3 cursor-pointer">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>

            <div id="guest-nav">
                <ul class="flex gap-2 font-bold mt-2">
                    <li><a href="/page/singup.html"
                            class="text-white hover:bg-[#ff8c00] hover:text-black border border-[#ff8c00] rounded-lg px-4 py-2 transition-all shadow-[0_0_10px_rgba(255,140,0,0.2)]">Sign
                            up</a></li>
                    <li><a href="/page/login.html"
                            class="text-black bg-[#ff8c00] hover:bg-white hover:shadow-[0_0_15px_rgba(255,255,255,0.4)] rounded-lg px-6 py-2 transition-all">Login</a>
                    </li>
                </ul>
            </div>

            <div id="user-nav"
                class="hidden relative bg-white/5 backdrop-blur-md border border-[#ff8c00]/50 rounded-xl px-4 py-2 items-center gap-2 transition-all duration-300 cursor-pointer hover:scale-105 hover:bg-white/10 hover:shadow-[0_0_15px_rgba(255,140,0,0.3)] mt-2">
                <div class="flex items-center gap-2.5">
                    <img id="nav-profile-img" src="/img/Image-11 สำเนา.jpg" alt="User"
                        class="w-8 h-8 rounded-full object-cover border-2 border-[#ff8c00]">
                    <button id="profile-btn" type="button" class="flex items-center gap-2 text-white font-bold">
                        <span id="username-display"></span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7">
                            </path>
                        </svg>
                    </button>
                    <div id="dropdown-menu"
                        class="hidden absolute right-0 top-full mt-3 w-48 bg-[#1a1a1c]/90 backdrop-blur-xl border border-white/10 rounded-xl shadow-2xl py-2 z-20">
                        <a href="/page/main_profile.html"
                            class="block px-4 py-2 text-sm text-white hover:bg-[#ff8c00] hover:text-black transition-colors rounded-lg">My
                            Profile</a>
                        <a href="#" id="logout-btn"
                            class="block px-4 py-2 text-sm text-red-400 hover:bg-red-500 hover:text-white transition-colors rounded-lg">Logout</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

        <div class="max-w-3xl mx-auto relative z-10 pt-4 pb-8">
            <header class="p-6 flex items-center justify-between">
                <h1 class="absolute left-1/2 -translate-x-1/2 text-[11px] text-[#ff8c00] font-black uppercase tracking-[0.4em]">Progress Tracker</h1>
                <div class="w-10"></div>
            </header>

            <div class="flex flex-col items-center mt-2">
                <div class="w-24 h-24 rounded-full border-2 border-[#ff8c00] p-1 shadow-[0_0_20px_rgba(255,140,0,0.5)] mb-4 bg-[#121212]">
                    <img src="../img/pho_member.png" alt="Client" class="w-full h-full rounded-full object-cover">
                </div>
                <h2 class="font-bold text-xl tracking-wide text-white drop-shadow-lg">BallKhonlhor_02</h2>
            </div>
        </div>
    </div>

    <main class="max-w-3xl mx-auto w-full flex-1 flex flex-col relative z-10 overflow-hidden px-4">
        
        <div class="flex-1 overflow-y-auto scroll-custom pb-32 pt-2">
            <div class="bg-white/5 backdrop-blur-xl border border-white/10 p-6 rounded-[2rem] shadow-2xl">
                
                <h3 class="font-black text-white text-lg mb-6 flex items-center gap-3 tracking-wide">
                    <span class="w-1.5 h-6 bg-[#ff8c00] rounded-full"></span>
                    Today's Exercises
                </h3>
                
                <div class="space-y-3" id="exercise-list">
                    </div>

            </div>
        </div>

        <div class="fixed bottom-8 right-8 z-50">
            <button onclick="finishSession()" class="bg-[#ff8c00] text-black font-black px-8 py-4 rounded-full flex items-center gap-2 shadow-[0_0_20px_rgba(255,140,0,0.3)] hover:scale-105 hover:bg-white transition-all transform active:scale-95 uppercase tracking-wide text-sm">
                เสร็จสิ้น 
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </button>
        </div>
    </main>

    <div id="success-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm transition-opacity duration-300 opacity-0">
        <div class="bg-[#18181a] border border-[#ff8c00]/30 p-8 rounded-3xl text-center shadow-[0_0_50px_rgba(255,140,0,0.2)] max-w-sm w-full mx-4 transform scale-90 transition-transform duration-300" id="modal-content">
            <div class="text-7xl mb-4 animate-bounce">🏆</div>
            <h2 class="text-2xl font-black text-white uppercase tracking-wider mb-2">Session Complete!</h2>
            <p class="text-gray-400 text-sm mb-8">บันทึกผลการฝึกของ BallKhonlhor_02 เรียบร้อยแล้ว เยี่ยมมาก!</p>
            <button onclick="window.location.href='trainer_dashboard.html'" class="w-full bg-[#ff8c00] text-black font-black py-4 rounded-xl hover:bg-white transition-all transform active:scale-95 uppercase tracking-widest shadow-lg">
                กลับสู่หน้าหลัก
            </button>
        </div>
    </div>
    <script src="../dist/js/helpers.js"></script>
    <script src="../dist/js/nav.js"></script>
    <script src="../dist/js/progress_tracker.js"></script>
</body>
</html>
