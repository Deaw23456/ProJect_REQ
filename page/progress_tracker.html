<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../src/style.css" rel="stylesheet">
    <title>Gym Hub - Progress Tracker</title>
    <style>
        html, body { height: 100vh; margin: 0; overflow: hidden; background-color: #0d0d0f; }
        .scroll-custom::-webkit-scrollbar { width: 4px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #ff8c00; border-radius: 10px; }
        .check-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="text-white font-sans relative overflow-x-hidden flex flex-col h-screen">

    <div class="relative w-full shrink-0">
        <div class="absolute inset-0 z-0 pointer-events-none">
            <img src="../img/Gym-bg.png" 
                class="w-full h-full object-cover opacity-30" alt="Gym Background">
            
            <div class="absolute inset-0 bg-gradient-to-t from-[#0d0d0f] via-[#0d0d0f]/80 to-transparent"></div>
            
            <div class="absolute bottom-0 inset-x-0 h-24 bg-gradient-to-t from-[#0d0d0f] to-transparent"></div>
        </div>

        <div class="max-w-3xl mx-auto relative z-10 pt-4 pb-8">
            <header class="p-6 flex items-center justify-between">
                <a href="./trainer_dashboard.html" class="w-10 h-10 bg-[#1f1f22]/80 hover:bg-[#ff8c00] hover:text-black rounded-full flex items-center justify-center transition-all border border-gray-700 font-bold shadow-lg">←</a>
                <h1 class="absolute left-1/2 -translate-x-1/2 text-[11px] text-[#ff8c00] font-black uppercase tracking-[0.4em]">Progress Tracker</h1>
                <div class="w-10"></div>
            </header>

            <div class="flex flex-col items-center mt-2">
                <div class="w-24 h-24 rounded-full border-2 border-[#ff8c00] p-1 shadow-[0_0_20px_rgba(255,140,0,0.5)] mb-4 bg-[#121212]">
                    <img src="../img/pho_member.png" alt="Client" class="w-full h-full rounded-full object-cover">
                </div>
                <h2 class="font-bold text-xl tracking-wide text-white drop-shadow-lg">BallKhonlhor_02</h2>
            </div>
        </div>
    </div>

    <main class="max-w-3xl mx-auto w-full flex-1 flex flex-col relative z-10 overflow-hidden px-4">
        
        <div class="flex-1 overflow-y-auto scroll-custom pb-32 pt-2">
            <div class="bg-[#151517] border border-gray-800/50 p-6 rounded-[2rem] shadow-2xl">
                
                <h3 class="font-black text-white text-lg mb-6 flex items-center gap-3 tracking-wide">
                    <span class="w-1.5 h-6 bg-[#ff8c00] rounded-full"></span>
                    Today's Exercises
                </h3>
                
                <div class="space-y-3" id="exercise-list">
                    </div>

            </div>
        </div>

        <div class="fixed bottom-8 right-8 z-50">
            <button onclick="finishSession()" class="bg-[#ff8c00] text-black font-black px-8 py-4 rounded-full flex items-center gap-2 shadow-[0_0_20px_rgba(255,140,0,0.3)] hover:scale-105 hover:bg-white transition-all transform active:scale-95 uppercase tracking-wide text-sm">
                เสร็จสิ้น 
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </button>
        </div>
    </main>

    <div id="success-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm transition-opacity duration-300 opacity-0">
        <div class="bg-[#18181a] border border-[#ff8c00]/30 p-8 rounded-3xl text-center shadow-[0_0_50px_rgba(255,140,0,0.2)] max-w-sm w-full mx-4 transform scale-90 transition-transform duration-300" id="modal-content">
            <div class="text-7xl mb-4 animate-bounce">🏆</div>
            <h2 class="text-2xl font-black text-white uppercase tracking-wider mb-2">Session Complete!</h2>
            <p class="text-gray-400 text-sm mb-8">บันทึกผลการฝึกของ BallKhonlhor_02 เรียบร้อยแล้ว เยี่ยมมาก!</p>
            <button onclick="window.location.href='trainer_dashboard.html'" class="w-full bg-[#ff8c00] text-black font-black py-4 rounded-xl hover:bg-white transition-all transform active:scale-95 uppercase tracking-widest shadow-lg">
                กลับสู่หน้าหลัก
            </button>
        </div>
    </div>

    <script>
        let activeWorkout = JSON.parse(localStorage.getItem('clientWorkoutSession')) || [];

        function renderTracker() {
            const listContainer = document.getElementById('exercise-list');
            listContainer.innerHTML = '';

            if (activeWorkout.length === 0) {
                listContainer.innerHTML = `<p class="text-center text-gray-500 italic py-10">ยังไม่มีท่าออกกำลังกาย<br>กรุณากลับไปที่หน้า Assign Program</p>`;
                return;
            }

            activeWorkout.forEach((ex, index) => {
                const item = document.createElement('div');
                item.className = "exercise-item bg-[#1e1e20] p-4 rounded-2xl flex justify-between items-center cursor-pointer hover:bg-[#252528] border border-transparent hover:border-gray-700 transition-all duration-200";
                
                // สั่งให้กดทั้งกล่องแล้วติ๊กถูกเลย
                item.onclick = function() { toggleTask(this); };

                item.innerHTML = `
                    <div class="flex-1 pr-4">
                        <h4 class="font-bold text-md text-white">${ex.name}</h4>
                        <p class="text-xs text-gray-500 mt-1">${ex.detail}</p>
                    </div>
                    
                    <div class="flex items-center">
                        <div class="checkbox-circle w-6 h-6 rounded-full border-2 border-gray-600 flex items-center justify-center transition-all duration-300">
                            <svg class="check-icon w-3.5 h-3.5 text-black hidden check-pop" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                    </div>
                `;
                listContainer.appendChild(item);
            });
        }

        // ฟังก์ชันสลับติ๊กถูก
        function toggleTask(element) {
            const circle = element.querySelector('.checkbox-circle');
            const icon = element.querySelector('.check-icon');

            if (circle.classList.contains('bg-[#ff8c00]')) {
                // เอาติ๊กออก
                circle.classList.remove('bg-[#ff8c00]', 'border-[#ff8c00]');
                circle.classList.add('border-gray-600');
                icon.classList.add('hidden');
                element.classList.remove('border-[#ff8c00]/30', 'bg-[#ff8c00]/5');
            } else {
                // ใส่ติ๊ก
                circle.classList.remove('border-gray-600');
                circle.classList.add('bg-[#ff8c00]', 'border-[#ff8c00]');
                icon.classList.remove('hidden');
                element.classList.add('border-[#ff8c00]/30', 'bg-[#ff8c00]/5');
            }
        }

        // 🎯 กดปุ๊บ เด้งยินดีปั๊บ ไม่ต้องถามแล้ว
        function finishSession() {
            const modal = document.getElementById('success-modal');
            const modalContent = document.getElementById('modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.classList.add('opacity-100');
                modalContent.classList.remove('scale-90');
                modalContent.classList.add('scale-100');
            }, 10);
            
            // จบงานเสร็จ เคลียร์ข้อมูลทิ้ง
            localStorage.removeItem('clientWorkoutSession');
        }

        window.onload = renderTracker;
    </script>
</body>
</html>
