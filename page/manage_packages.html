<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../src/style.css" rel="stylesheet">
    <title>Gym Hub - Manage Packages</title>
    <style>
        html, body { height: 100vh; margin: 0; background-color: #0a0a0b; }
        .scroll-custom::-webkit-scrollbar { width: 5px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #ff8c00; border-radius: 10px; }
    </style>
</head>
<body class="text-white font-sans flex flex-col h-screen overflow-hidden relative">

    <div class="fixed inset-0 z-[-1] pointer-events-none overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-[#ff8c00]/10 blur-[120px] rounded-full"></div>
    </div>

    <header class="bg-white/5 backdrop-blur-md border-b border-white/10 pb-4 sticky top-0 z-50">
        <nav class="flex items-center justify-between px-6 py-2">
            <div class="flex-shrink-0">
                <a href="trainer_dashboard.html" class="text-white text-4xl font-bold flex mt-2">Gym<div class="text-black bg-[#ff8c00] rounded-md px-1 ml-0.5">Hub</div></a>
            </div>
            
            <div id="user-nav" class="relative bg-white/5 backdrop-blur-md border border-[#ff8c00]/50 rounded-xl px-4 py-2 flex items-center gap-2 mt-2 ml-auto">
                <img src="../img/pho_member.png" alt="User" class="w-8 h-8 rounded-full object-cover border-2 border-[#ff8c00]">
                <span class="font-bold text-white">Trainer_Ball</span>
            </div>
        </nav>
    </header>

    <main class="flex-1 overflow-y-auto p-8 scroll-custom flex flex-col items-center">
        
        <div class="w-full max-w-6xl flex justify-between items-end mb-10">
            <div>
                <h1 class="text-5xl font-black italic uppercase tracking-tighter mb-2 text-white drop-shadow-lg">My Packages</h1>
                <p class="text-gray-400 font-bold tracking-wide text-sm">จัดการคอร์สเรียนและราคาของคุณ</p>
            </div>
            <button onclick="saveAndExit()" class="bg-[#ff8c00] text-black font-black px-8 py-3 rounded-xl shadow-[0_0_15px_rgba(255,140,0,0.3)] hover:bg-white transition-all transform hover:-translate-y-1 active:scale-95 uppercase tracking-wide flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                Save Packages
            </button>
        </div>

        <div class="w-full max-w-6xl grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pb-10" id="package-grid">
            </div>
    </main>

    <div id="package-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm transition-opacity duration-300 opacity-0 px-4">
        <div class="bg-[#1a1a1c] border border-gray-700 p-8 rounded-[2rem] shadow-2xl max-w-lg w-full transform scale-90 transition-transform duration-300" id="modal-content">
            
            <div class="flex justify-between items-center mb-6">
                <h2 id="modal-title" class="text-2xl font-black text-white uppercase italic tracking-wide">Add Package</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="block text-xs text-gray-300 font-black uppercase tracking-widest mb-2">Package Name</label>
                    <input type="text" id="pkg-name" placeholder="e.g. VIP Muscle Gain" 
                        class="w-full bg-[#28282b] border border-gray-500 rounded-xl px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:border-[#ff8c00] focus:bg-[#323236] transition-all font-bold shadow-inner">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-gray-300 font-black uppercase tracking-widest mb-2">Price (THB)</label>
                        <input type="number" id="pkg-price" placeholder="5000" 
                            class="w-full bg-[#28282b] border border-gray-500 rounded-xl px-4 py-3 text-[#ff8c00] placeholder-gray-400 font-black focus:outline-none focus:border-[#ff8c00] focus:bg-[#323236] transition-all shadow-inner">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-300 font-black uppercase tracking-widest mb-2">Total Sessions</label>
                        <input type="number" id="pkg-sessions" placeholder="10" 
                            class="w-full bg-[#28282b] border border-gray-500 rounded-xl px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:border-[#ff8c00] focus:bg-[#323236] transition-all font-bold shadow-inner">
                    </div>
                </div>

                <div>
                    <label class="block text-xs text-gray-300 font-black uppercase tracking-widest mb-2">Short Description</label>
                    <textarea id="pkg-desc" rows="3" placeholder="อธิบายแพ็กเกจแบบสั้นๆ..." 
                        class="w-full bg-[#28282b] border border-gray-500 rounded-xl px-4 py-3 text-white placeholder-gray-400 text-sm focus:outline-none focus:border-[#ff8c00] focus:bg-[#323236] transition-all resize-none shadow-inner"></textarea>
                </div>
            </div>

            <div class="mt-8 flex gap-3">
                <button onclick="closeModal()" class="flex-1 bg-transparent border border-gray-500 text-gray-300 font-bold py-3.5 rounded-xl hover:bg-gray-700 hover:text-white transition-colors uppercase tracking-widest text-sm">Cancel</button>
                <button onclick="savePackage()" class="flex-1 bg-[#ff8c00] text-black font-black py-3.5 rounded-xl hover:bg-white shadow-[0_0_15px_rgba(255,140,0,0.3)] transition-all transform active:scale-95 uppercase tracking-widest text-sm">Save Package</button>
            </div>
            
        </div>
    </div>

    <script>
        let packagesData = [
            { 
                name: "Basic Starter", 
                price: 4500, 
                sessions: 10, 
                desc: "เหมาะสำหรับผู้เริ่มต้นที่ต้องการปูพื้นฐานการออกกำลังกายที่ถูกต้อง",
                popular: false 
            },
            { 
                name: "Pro Transformation", 
                price: 8000, 
                sessions: 20, 
                desc: "เปลี่ยนรูปร่างแบบเร่งด่วน พร้อมดูแลโภชนาการแบบจัดเต็ม",
                popular: true 
            }
        ];

        let editingIndex = -1;

        function renderPackages() {
            const grid = document.getElementById('package-grid');
            grid.innerHTML = ''; 

            packagesData.forEach((pkg, index) => {
                const card = document.createElement('div');
                
                if(pkg.popular) {
                    card.className = "bg-[#1a1005] border-2 border-[#ff8c00] rounded-[2rem] p-8 flex flex-col relative transition-all duration-300 transform md:scale-105 shadow-[0_0_30px_rgba(255,140,0,0.15)] z-10";
                    card.innerHTML = `<div class="absolute -top-4 left-1/2 -translate-x-1/2 bg-[#ff8c00] text-black font-black px-4 py-1 rounded-full text-[10px] uppercase tracking-widest shadow-lg">Most Popular</div>`;
                } else {
                    card.className = "bg-[#151517] border border-gray-800 rounded-[2rem] p-8 flex flex-col relative transition-all duration-300 hover:border-[#ff8c00]/50 hover:shadow-[0_10px_30px_rgba(255,140,0,0.1)] group";
                    card.innerHTML = '';
                }

                card.innerHTML += `
                    <h2 class="text-[#ff8c00] font-black uppercase tracking-widest text-sm mb-2">${pkg.name}</h2>
                    <div class="flex items-baseline gap-2 mb-6">
                        <span class="text-5xl font-black text-white">฿${Number(pkg.price).toLocaleString()}</span>
                    </div>
                    <p class="text-gray-400 text-sm mb-8 pb-6 border-b border-gray-800">${pkg.desc}</p>
                    
                    <ul class="space-y-4 mb-8 flex-1">
                        <li class="flex items-center gap-3 text-sm font-bold text-gray-300">
                            <svg class="w-5 h-5 text-[#ff8c00]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            เรียนตัวต่อตัว ${pkg.sessions} ครั้ง
                        </li>
                    </ul>

                    <div class="flex gap-2 mt-auto">
                        <button onclick="editPackage(${index})" class="flex-1 bg-[${pkg.popular ? '#ff8c00' : '#1f1f22'}] text-${pkg.popular ? 'black' : 'white'} hover:bg-white hover:text-black border border-transparent font-bold py-3 rounded-xl transition-all uppercase text-xs tracking-wider">Edit</button>
                        
                        <button onclick="deletePackage(${index})" class="bg-[#1f1f22] border border-gray-700 hover:bg-red-500 hover:text-white hover:border-red-500 text-gray-400 font-bold p-3 rounded-xl transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });

            const addBtnBox = document.createElement('div');
            addBtnBox.onclick = openModal;
            addBtnBox.className = "border-2 border-dashed border-gray-700 rounded-[2rem] p-8 flex flex-col items-center justify-center text-gray-500 hover:text-[#ff8c00] hover:border-[#ff8c00] hover:bg-white/5 transition-all duration-300 cursor-pointer min-h-[400px]";
            addBtnBox.innerHTML = `
                <div class="w-16 h-16 rounded-full bg-gray-800 flex items-center justify-center mb-4 transition-transform group-hover:scale-110">
                    <span class="text-3xl font-black">+</span>
                </div>
                <h3 class="font-bold text-lg">Create New Package</h3>
                <p class="text-xs mt-2 text-center opacity-70">สร้างแพ็กเกจราคาใหม่<br>เพื่อนำเสนอลูกค้า</p>
            `;
            grid.appendChild(addBtnBox);
        }

        function openModal() {
            editingIndex = -1; 
            document.getElementById('modal-title').innerText = "Add New Package";
            
            document.getElementById('pkg-name').value = '';
            document.getElementById('pkg-price').value = '';
            document.getElementById('pkg-sessions').value = '';
            document.getElementById('pkg-desc').value = '';

            showModalUI();
        }

        function editPackage(index) {
            editingIndex = index; 
            document.getElementById('modal-title').innerText = "Edit Package";
            
            const pkg = packagesData[index];
            document.getElementById('pkg-name').value = pkg.name;
            document.getElementById('pkg-price').value = pkg.price;
            document.getElementById('pkg-sessions').value = pkg.sessions;
            document.getElementById('pkg-desc').value = pkg.desc;

            showModalUI();
        }

        function savePackage() {
            const name = document.getElementById('pkg-name').value;
            const price = document.getElementById('pkg-price').value;
            const sessions = document.getElementById('pkg-sessions').value;
            const desc = document.getElementById('pkg-desc').value;

            if(!name || !price || !sessions) {
                alert("กรุณากรอก ชื่อแพ็กเกจ, ราคา, และจำนวนครั้ง ให้ครบถ้วนครับ!");
                return;
            }

            const newPkg = { name, price, sessions, desc, popular: false };

            if (editingIndex === -1) {
                packagesData.push(newPkg);
            } else {
                newPkg.popular = packagesData[editingIndex].popular;
                packagesData[editingIndex] = newPkg;
            }

            closeModal();
            renderPackages(); 
        }

        function deletePackage(index) {
            if(confirm(`คุณแน่ใจหรือไม่ว่าต้องการลบแพ็กเกจ "${packagesData[index].name}"?`)) {
                packagesData.splice(index, 1); 
                renderPackages(); 
            }
        }

        // 🎯 ฟังก์ชันใหม่: กดเซฟทั้งหมดแล้วเด้งไปหน้า Profile
        function saveAndExit() {
            alert('✅ บันทึกแพ็กเกจทั้งหมดเรียบร้อยแล้ว!');
            window.location.href = 'trainer_profile.html';
        }

        const modal = document.getElementById('package-modal');
        const modalContent = document.getElementById('modal-content');

        function showModalUI() {
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.classList.add('opacity-100');
                modalContent.classList.remove('scale-90');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-90');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        window.onload = renderPackages;

    </script>
</body>
</html>
