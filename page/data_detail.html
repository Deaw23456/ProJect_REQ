<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../src/style.css" rel="stylesheet">
    <title>Document</title>
</head>

<body class="bg-[#181819]">
    <header class="border-b-2 border-amber-50 pb-4">
        <div class="text-white opacity-30 flex justify-center">Project REQ & Font-end</div>
    </header>
    <main>
        <div class="flex justify-center mt-20 mb-5">
            <a href="/index.html" class="text-white text-4xl font-bold flex">Gym<div
                    class="text-black bg-[#ff8c00] rounded-md px-1 ml-0.5">Hub</div></a>
        </div>
        <div class="max-w-md mx-auto mb-8 px-4">
            <div class="relative flex items-center justify-between">
                <div class="absolute left-5 top-1/2 transform -translate-y-1/2 w-95 h-0.5 bg-[#4c4c4c] -z-10"></div>
                <div class="flex flex-col items-center">
                    <div
                        class="w-8 h-8 bg-[#4c4c4c] rounded-full flex items-center justify-center text-white font-bold text-sm">
                        1</div>
                    <span class="text-[#4c4c4c] text-xs mt-1">Account</span>
                </div>
                <div class="flex flex-col items-center">
                    <div
                        class="w-8 h-8 bg-[#ff8c00] rounded-full flex items-center justify-center text-white font-bold text-sm">
                        2</div>
                    <span class="text-[#ff8c00] text-xs mt-1">Details</span>
                </div>
                <div class="flex flex-col items-center">
                    <div
                        class="w-8 h-8 bg-[#4c4c4c] rounded-full flex items-center justify-center text-white font-bold text-sm">
                        3</div>
                    <span class="text-gray-500 text-xs mt-1">Finish</span>
                </div>
            </div>
        </div>
        <div class="bg-[#2f2f2f] p-8 rounded-lg max-w-md mx-auto py-10">
            <form action="#" method="POST" class="space-y-6">
                <div>
                    <label for="fullname" class="block text-sm font-medium text-white">Name - Surname</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Enter Name - Surname" required
                        class="mt-1 block w-full px-3 py-2 border border-[#4c4c4c] text-white bg-[#4c4c4c] rounded-md shadow-sm focus:outline-none focus:ring-[#ff8c00] focus:border-[#ff8c00]">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="age" class="block text-sm font-medium text-white">Age</label>
                        <input type="number" id="age" name="age" placeholder="Age" required
                            class="mt-1 block w-full px-3 py-2 border border-[#4c4c4c] text-white bg-[#4c4c4c] rounded-md shadow-sm focus:outline-none focus:ring-[#ff8c00] focus:border-[#ff8c00]">
                    </div>
                    <div>
                        <label for="gender" class="block text-sm font-medium text-white">Gender</label>
                        <select id="gender" name="gender" required
                            class="mt-1 block w-full h-10.5 px-3 py-2 border border-[#4c4c4c] text-white bg-[#4c4c4c] rounded-md shadow-sm focus:outline-none focus:ring-[#ff8c00] focus:border-[#ff8c00]">
                            <option value="" disabled selected>Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label for="position" class="block text-sm font-medium text-white">Position</label>
                    <select id="position" name="position" required
                        class="mt-1 block w-full h-10.5 px-3 py-2 border border-[#4c4c4c] text-white bg-[#4c4c4c] rounded-md shadow-sm focus:outline-none focus:ring-[#ff8c00] focus:border-[#ff8c00]">
                        <option value="" disabled selected>Select Position</option>
                        <option value="member">Member</option>
                        <option value="trainer">Trainer</option>
                    </select>
                </div>
                <div>
                    <label for="phone" class="block text-sm font-medium text-white">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="Enter Phone Number" required
                        class="mt-1 block w-full px-3 py-2 border border-[#4c4c4c] text-white bg-[#4c4c4c] rounded-md shadow-sm focus:outline-none focus:ring-[#ff8c00] focus:border-[#ff8c00]">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="weight" class="block text-sm font-medium text-white">Weight (kg)</label>
                        <input type="number" id="weight" name="weight" placeholder="Weight" required
                            class="mt-1 block w-full px-3 py-2 border border-[#4c4c4c] text-white bg-[#4c4c4c] rounded-md shadow-sm focus:outline-none focus:ring-[#ff8c00] focus:border-[#ff8c00]">
                    </div>
                    <div>
                        <label for="height" class="block text-sm font-medium text-white">Height (cm)</label>
                        <input type="number" id="height" name="height" placeholder="Height" required
                            class="mt-1 block w-full px-3 py-2 border border-[#4c4c4c] text-white bg-[#4c4c4c] rounded-md shadow-sm focus:outline-none focus:ring-[#ff8c00] focus:border-[#ff8c00]">
                    </div>
                </div>
                <button type="button" onclick="finiSh()" class="w-full bg-[#ff8c00] text-black py-2 px-4 rounded-md hover:bg-[#ff8c00]/90 font-bold items-center flex justify-center cursor-pointer">Submit</button>
            </form>
        </div>
    </main>
        <script src="../dist/js/data_detail.js"></script>
</body>

</html>
