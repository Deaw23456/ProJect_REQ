<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../src/style.css" rel="stylesheet">
    <title>Datadetail</title>
</head>

<body class="bg-[#0a0a0b]">
    <div class="fixed inset-0 z-[-1] pointer-events-none overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-[#ff8c00]/10 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-5%] w-[400px] h-[400px] bg-[#ff8c00]/10 blur-[100px] rounded-full"></div>
        <div class="absolute top-[40%] left-[50%] w-[300px] h-[300px] bg-white/5 blur-[80px] rounded-full"></div>
    </div>

    <header class="border-b-2 border-amber-50 pb-4">
        <div class="text-white opacity-30 flex justify-center">Project REQ & Font-end</div>
    </header>
    <main>
        <div class="flex justify-center mt-10 mb-10 hover:scale-105 transition-transform duration-300">
            <a href="/index.html" class="text-white text-5xl font-black italic uppercase tracking-tighter flex">Gym<div
                    class="text-black bg-[#ff8c00] rounded-md px-1 ml-0.5 shadow-[0_0_15px_rgba(255,140,0,0.5)]">Hub</div></a>
        </div>

        <div class="max-w-md mx-auto mb-8 px-4">
            <div class="relative flex items-center justify-between">
                <div class="absolute left-10 top-1/2 transform -translate-y-1/2 w-[85%] h-0.5 bg-[#4c4c4c] -z-10"></div>
                <div class="flex flex-col items-center">
                    <div class="w-8 h-8 bg-[#ff8c00] rounded-full flex items-center justify-center text-black font-black text-sm shadow-[0_0_10px_rgba(255,140,0,0.5)]">✓</div>
                    <span class="text-gray-300 font-bold text-xs mt-2 uppercase tracking-wider">Account</span>
                </div>
                <div class="flex flex-col items-center">
                    <div class="w-8 h-8 bg-[#ff8c00] rounded-full flex items-center justify-center text-black font-black text-sm shadow-[0_0_10px_rgba(255,140,0,0.5)]">2</div>
                    <span class="text-[#ff8c00] font-bold text-xs mt-2 uppercase tracking-wider">Details</span>
                </div>
                <div class="flex flex-col items-center">
                    <div class="w-8 h-8 bg-[#4c4c4c] rounded-full flex items-center justify-center text-white font-bold text-sm">3</div>
                    <span class="text-gray-500 text-xs mt-2 uppercase tracking-wider font-bold">Finish</span>
                </div>
            </div>
        </div>

        <div class="bg-[#1f1f22] border border-gray-800 p-8 rounded-[2rem] max-w-md mx-auto py-10 shadow-2xl relative overflow-hidden">
            <div class="absolute top-[-50px] right-[-50px] w-32 h-32 bg-[#ff8c00]/10 blur-[40px] rounded-full pointer-events-none"></div>

            <div class="mb-8 text-center">
                <h2 class="text-2xl font-black text-white uppercase tracking-widest">Personal Details</h2>
                <p class="text-gray-400 text-xs mt-1">บอกเราเกี่ยวกับตัวคุณเพิ่มเติม</p>
            </div>

            <form action="#" method="POST" class="space-y-5 relative z-10">
                <div>
                    <label for="fullname" class="block text-xs font-black text-gray-300 uppercase tracking-widest mb-1.5 ml-1">Name - Surname</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Enter Name - Surname" required
                        class="block w-full px-4 py-3.5 border border-gray-600 text-white bg-[#28282b] rounded-xl shadow-inner focus:outline-none focus:ring-2 focus:ring-[#ff8c00] focus:border-[#ff8c00] transition-all">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="age" class="block text-xs font-black text-gray-300 uppercase tracking-widest mb-1.5 ml-1">Age</label>
                        <input type="number" id="age" name="age" placeholder="Age" required
                            class="block w-full px-4 py-3.5 border border-gray-600 text-white bg-[#28282b] rounded-xl shadow-inner focus:outline-none focus:ring-2 focus:ring-[#ff8c00] focus:border-[#ff8c00] transition-all">
                    </div>
                    <div>
                        <label for="gender" class="block text-xs font-black text-gray-300 uppercase tracking-widest mb-1.5 ml-1">Gender</label>
                        <select id="gender" name="gender" required class="block w-full h-13 px-4 py-3.5 border border-gray-600 text-white bg-[#28282b] rounded-xl shadow-inner focus:outline-none focus:ring-2 focus:ring-[#ff8c00] focus:border-[#ff8c00] transition-all [&>option]:text-black">
                            <option value="" disabled selected>Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label for="position" class="block text-xs font-black text-gray-300 uppercase tracking-widest mb-1.5 ml-1">Position</label>
                    <select id="position" name="position" required
                        class="block w-full h-13 px-4 py-3.5 border border-gray-600 text-white bg-[#28282b] rounded-xl shadow-inner focus:outline-none focus:ring-2 focus:ring-[#ff8c00] focus:border-[#ff8c00] transition-all [&>option]:text-black">
                        <option value="" disabled selected>Select Position</option>
                        <option value="member">Member</option>
                        <option value="trainer">Trainer</option>
                    </select>
                </div>
                <div>
                    <label for="phone" class="block text-xs font-black text-gray-300 uppercase tracking-widest mb-1.5 ml-1">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="Enter Phone Number" required
                        class="block w-full px-4 py-3.5 border border-gray-600 text-white bg-[#28282b] rounded-xl shadow-inner focus:outline-none focus:ring-2 focus:ring-[#ff8c00] focus:border-[#ff8c00] transition-all">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="weight" class="block text-xs font-black text-gray-300 uppercase tracking-widest mb-1.5 ml-1">Weight (kg)</label>
                        <input type="number" id="weight" name="weight" placeholder="Weight" required
                            class="block w-full px-4 py-3.5 border border-gray-600 text-white bg-[#28282b] rounded-xl shadow-inner focus:outline-none focus:ring-2 focus:ring-[#ff8c00] focus:border-[#ff8c00] transition-all">
                    </div>
                    <div>
                        <label for="height" class="block text-xs font-black text-gray-300 uppercase tracking-widest mb-1.5 ml-1">Height (cm)</label>
                        <input type="number" id="height" name="height" placeholder="Height" required
                            class="block w-full px-4 py-3.5 border border-gray-600 text-white bg-[#28282b] rounded-xl shadow-inner focus:outline-none focus:ring-2 focus:ring-[#ff8c00] focus:border-[#ff8c00] transition-all">
                    </div>
                </div>
                <button type="button" id="submit-details-button"
                    class="w-full bg-[#ff8c00] text-black py-4 px-4 rounded-xl hover:bg-[#ff8c00]/90 font-bold items-center flex justify-center cursor-pointer transition-all">Next</button>
            </form>
        </div>
    </main>
    <script src="../dist/js/helpers.js"></script>
    <script src="../dist/js/nav.js"></script>
    <script src="../dist/js/data_detail.js"></script>
</body>

</html>
