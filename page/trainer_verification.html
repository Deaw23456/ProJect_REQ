<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../src/style.css" rel="stylesheet">
    <title>Gym Hub - Trainer Verification</title>
</head>
<body class="bg-[#0a0a0b]">
    <!-- Background decorative elements -->
    <div class="fixed inset-0 z-[-1] pointer-events-none overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-[#ff8c00]/10 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-5%] w-[400px] h-[400px] bg-[#ff8c00]/10 blur-[100px] rounded-full"></div>
    </div>

    <header class="pb-4">
        <div class="text-white opacity-30 flex justify-center">Project REQ & Font-end</div>
    </header>
    
    <main>
        <!-- Logo -->
        <div class="flex justify-center mt-10 mb-10 hover:scale-105 transition-transform duration-300">
            <a href="/index.html" class="text-white text-5xl font-black italic uppercase tracking-tighter flex">Gym<div
                    class="text-black bg-[#ff8c00] rounded-md px-1 ml-0.5 shadow-[0_0_15px_rgba(255,140,0,0.5)]">Hub</div></a>
        </div>

        <!-- Verification Form Container -->
        <div class="bg-[#1f1f22] border border-gray-800 p-8 rounded-[2rem] max-w-2xl mx-auto py-10 shadow-2xl relative overflow-hidden">
            
            <div class="mb-8 text-center">
                <h2 class="text-2xl font-black text-white uppercase tracking-widest">Trainer Verification</h2>
                <p class="text-gray-400 text-xs mt-1">โปรดอัปโหลดเอกสารเพื่อยืนยันตัวตนของคุณ</p>
            </div>

            <form id="verification-form" class="space-y-8 relative z-10">
                <!-- ID Card Upload -->
                <div>
                    <label class="block text-xs font-black text-gray-300 uppercase tracking-widest mb-2 ml-1">1. Upload ID Card / Passport</label>
                    <div class="mt-2 flex justify-center rounded-2xl border border-dashed border-gray-600 px-6 py-10 bg-[#28282b]/50">
                        <div class="text-center">
                            <img id="id-card-preview" src="#" alt="ID Card Preview" class="mx-auto h-32 w-auto mb-4 hidden rounded-lg">
                            <svg id="id-card-icon" class="mx-auto h-12 w-12 text-gray-500" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                                <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                            <div class="mt-4 flex text-sm justify-center items-center gap-x-4">
                                <label for="id-card-upload-input" class="relative cursor-pointer rounded-md font-semibold text-[#ff8c00] hover:text-[#ffae00]">
                                    <span>Upload a file</span>
                                    <input id="id-card-upload-input" name="id-card-upload" type="file" class="sr-only" accept="image/*">
                                </label>
                                <button type="button" id="id-card-remove-btn" class="hidden text-xs text-red-500 hover:text-red-700 font-semibold transition-colors">Remove</button>
                            </div>
                            <p class="text-xs text-gray-500 mt-1">PNG, JPG, GIF up to 10MB</p>
                        </div>
                    </div>
                </div>

                <!-- Certificate Upload -->
                <div>
                    <label class="block text-xs font-black text-gray-300 uppercase tracking-widest mb-2 ml-1">2. Upload Certificate (Optional)</label>
                    <div class="mt-2 flex justify-center rounded-2xl border border-dashed border-gray-600 px-6 py-10 bg-[#28282b]/50">
                        <div class="text-center">
                            <img id="certificate-preview" src="#" alt="Certificate Preview" class="mx-auto h-32 w-auto mb-4 hidden rounded-lg">
                            <svg id="certificate-icon" class="mx-auto h-12 w-12 text-gray-500" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                                <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                            <div class="mt-4 flex text-sm justify-center items-center gap-x-4">
                                <label for="certificate-upload-input" class="relative cursor-pointer rounded-md font-semibold text-[#ff8c00] hover:text-[#ffae00]">
                                    <span>Upload a file</span>
                                    <input id="certificate-upload-input" name="certificate-upload" type="file" class="sr-only" accept="image/*">
                                </label>
                                <button type="button" id="certificate-remove-btn" class="hidden text-xs text-red-500 hover:text-red-700 font-semibold transition-colors">Remove</button>
                            </div>
                            <p class="text-xs text-gray-500 mt-1">PNG, JPG, GIF up to 10MB</p>
                        </div>
                    </div>
                </div>

                <button type="submit" id="submit-verification-button" class="w-full bg-[#ff8c00] text-black py-4 px-4 rounded-xl hover:bg-[#ff8c00]/90 font-bold items-center flex justify-center cursor-pointer transition-all !mt-10">
                    Submit for Verification
                </button>
            </form>
        </div>
    </main>
    <script src="../dist/js/trainer_verification.js"></script>
</body>
</html>
