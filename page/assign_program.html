<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../src/style.css" rel="stylesheet">
    <title>Gym Hub - Client Profile</title>
    <style>
        html, body { height: 100vh; margin: 0; overflow: hidden; background-color: #121212; }
        .scroll-custom::-webkit-scrollbar { width: 4px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #FF6600; border-radius: 10px; }
        
        /* สไตล์สำหรับ Template ที่ถูกเลือก */
        .template-active { border-color: #FF6600 !important; background-color: rgba(255, 102, 0, 0.1) !important; }
    </style>
</head>
<body class="text-white font-sans flex h-screen w-full">

    <aside class="w-80 border-r border-gray-800 flex flex-col bg-[#181819] shadow-2xl h-full p-8 z-10">
        <div class="flex items-center gap-4 mb-8">
            <a href="trainer_dashboard.html" class="bg-[#FF6600] text-white rounded-full w-10 h-10 flex items-center justify-center font-bold hover:scale-110 transition-all shadow-lg shadow-[#FF6600]/20">←</a>
            <h2 class="text-xl font-black italic uppercase tracking-tighter">Client Profile</h2>
        </div>

        <div class="flex flex-col items-center mb-8">
            <div class="w-32 h-32 rounded-full border-4 border-[#FF6600] overflow-hidden mb-4 shadow-[0_0_15px_rgba(255,102,0,0.3)]">
                <img src="../img/pho_member.png" alt="Client" class="w-full h-full object-cover">
            </div>
            <h3 class="text-2xl font-black uppercase tracking-wide">Liam Carter</h3>
            <span class="bg-green-500/20 text-green-500 text-xs font-bold px-3 py-1 rounded-full mt-2 uppercase">Active Member</span>
        </div>

        <div class="bg-[#121212] rounded-2xl p-5 border border-gray-800 space-y-4">
            <h4 class="text-[10px] text-gray-500 font-bold uppercase tracking-widest border-b border-gray-800 pb-2">Physical Stats</h4>
            <div class="flex justify-between items-center">
                <span class="text-sm text-gray-400">Goal</span>
                <span class="font-bold text-[#FF6600]">Fat Loss</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-sm text-gray-400">Weight</span>
                <span class="font-bold text-white">75 kg</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-sm text-gray-400">Height</span>
                <span class="font-bold text-white">178 cm</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-sm text-gray-400">Exp. Level</span>
                <span class="font-bold text-white">Beginner</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full bg-[#121212] relative">
        <div class="flex-1 overflow-y-auto p-12 scroll-custom">
            <div class="max-w-4xl mx-auto w-full">
                
                <div class="mb-10">
                    <p class="text-[12px] text-[#FF6600] font-black uppercase tracking-[0.4em] mb-2">Assign Workout</p>
                    <h1 class="text-6xl font-black italic uppercase tracking-tighter">SELECT PROGRAM</h1>
                    <div class="h-1.5 w-24 bg-[#FF6600] mt-4 rounded-full shadow-[0_0_10px_#FF6600]"></div>
                </div>

                <div class="mb-10">
                    <h4 class="text-sm text-gray-400 font-bold uppercase tracking-widest mb-4">1. Import from Templates</h4>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-4" id="template-options">
                        <button onclick="loadTemplate(this, 'Full Body Blast')" class="p-5 bg-[#1f1f20] border border-gray-800 rounded-2xl text-left hover:border-[#FF6600]/50 transition-all group">
                            <h5 class="font-black italic text-xl uppercase group-hover:text-[#FF6600] transition-colors">Full Body Blast</h5>
                            <p class="text-xs text-gray-500 mt-1">4 Exercises • 20 Min</p>
                        </button>
                        <button onclick="loadTemplate(this, 'Leg Day')" class="p-5 bg-[#1f1f20] border border-gray-800 rounded-2xl text-left hover:border-[#FF6600]/50 transition-all group">
                            <h5 class="font-black italic text-xl uppercase group-hover:text-[#FF6600] transition-colors">Leg Day</h5>
                            <p class="text-xs text-gray-500 mt-1">3 Exercises • 15 Min</p>
                        </button>
                    </div>
                </div>

                <div>
                    <h4 class="text-sm text-gray-400 font-bold uppercase tracking-widest mb-4 flex justify-between items-end">
                        <span>2. Program Preview</span>
                        <span id="preview-status" class="text-[10px] text-[#FF6600]">Waiting for selection...</span>
                    </h4>
                    
                    <div id="exercise-preview" class="space-y-3 bg-[#181819] p-6 rounded-3xl border border-gray-800 min-h-[200px] flex flex-col justify-center items-center">
                        <p class="text-gray-600 font-bold italic">Please select a template above to preview exercises.</p>
                    </div>
                </div>

            </div>
        </div>

        <footer class="p-8 border-t border-gray-800 flex justify-end px-16 bg-[#121212]/90 backdrop-blur-sm">
            <button onclick="assignToClient()" id="assign-btn" class="bg-gray-800 text-gray-500 font-black py-4 px-12 rounded-xl transition-all transform text-lg uppercase tracking-wide cursor-not-allowed" disabled>
                Confirm Assignment
            </button>
        </footer>
    </main>

    <script>
        // จำลองฐานข้อมูล Template ที่เราสร้างไว้ในหน้า Manage Program
        const mockDatabase = {
            "Full Body Blast": [
                { name: "กระโดดตบ (Jumping Jacks)", reps: "20 ครั้ง / 3 เซ็ต" },
                { name: "วิดพื้น (Push-ups)", reps: "15 ครั้ง / 3 เซ็ต" },
                { name: "สควอท (Squats)", reps: "20 ครั้ง / 4 เซ็ต" },
                { name: "แพลงก์ (Plank)", reps: "60 วินาที / 3 เซ็ต" }
            ],
            "Leg Day": [
                { name: "สควอท (Squats)", reps: "20 ครั้ง / 4 เซ็ต" },
                { name: "ลันจ์ (Lunges)", reps: "15 ครั้ง / 3 เซ็ต (ต่อข้าง)" },
                { name: "กระโดดเชือก", reps: "3 นาที / อุปกรณ์: เชือก" }
            ]
        };

        let currentSelectedTemplate = null;

        function loadTemplate(btnElement, templateName) {
            // 1. จัดการ UI ปุ่มเลือก Template
            document.querySelectorAll('#template-options button').forEach(btn => {
                btn.classList.remove('template-active');
            });
            btnElement.classList.add('template-active');
            currentSelectedTemplate = templateName;

            // 2. ดึงข้อมูลจาก mockDatabase มาแสดงผล
            const exercises = mockDatabase[templateName];
            const previewContainer = document.getElementById('exercise-preview');
            
            // เปลี่ยนคลาส Container ให้ชิดบน (เลิกอยู่ตรงกลาง)
            previewContainer.classList.remove('justify-center', 'items-center');
            previewContainer.innerHTML = ''; // ล้างของเก่า

            exercises.forEach((ex, index) => {
                const item = document.createElement('div');
                item.className = "bg-[#1f1f20] p-4 rounded-xl border border-gray-800 flex justify-between items-center animate-in fade-in slide-in-from-bottom-2";
                item.style.animationDelay = `${index * 50}ms`; // ใส่ลูกเล่นค่อยๆ โผล่
                item.innerHTML = `
                    <div class="flex flex-col">
                        <span class="font-black text-white text-lg">${index + 1}. ${ex.name}</span>
                        <span class="text-sm text-[#FF6600] font-bold">${ex.reps}</span>
                    </div>
                    <button class="text-gray-600 hover:text-red-500 transition text-[10px] uppercase">Remove</button>
                `;
                previewContainer.appendChild(item);
            });

            // 3. ปลดล็อกปุ่ม Assign และอัปเดตข้อความ
            document.getElementById('preview-status').innerText = `Previewing: ${templateName}`;
            
            const assignBtn = document.getElementById('assign-btn');
            assignBtn.disabled = false;
            assignBtn.className = "bg-[#FF6600] text-white font-black py-4 px-12 rounded-xl shadow-[0_0_20px_rgba(255,102,0,0.3)] hover:bg-white hover:text-black hover:shadow-white/30 transition-all transform active:scale-95 text-lg uppercase tracking-wide";
        }

        function assignToClient() {
            if(!currentSelectedTemplate) return;
            
            // สมมติว่ายิง API หรือเซฟลง LocalStorage
            console.log(`Assigned '${currentSelectedTemplate}' to Liam Carter`);
            
            alert(`✅ จ่ายโปรแกรม "${currentSelectedTemplate}" ให้ Liam สำเร็จแล้ว!`);
            
            // กลับไปหน้า Dashboard
            window.location.href = 'trainer_dashboard.html';
        }
    </script>
</body>
</html>
