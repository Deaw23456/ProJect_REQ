<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../src/style.css" rel="stylesheet">
    <title>Gym Hub - Assign Program</title>
    <style>
        html, body { background-color: #121212; min-height: 100vh; }
        .scroll-custom::-webkit-scrollbar { width: 5px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #ff8c00; border-radius: 10px; }
        
        /* สไตล์ปุ่มที่ถูกเลือก */
        .template-active { 
            border-color: #ff8c00 !important; 
            background-color: #2a1a0a !important; 
        }
    </style>
</head>
<body class="text-white font-sans flex flex-col h-screen overflow-hidden">

    <header class="bg-[#181819] border-b border-gray-800 p-6 flex items-center justify-between z-10">
        <div class="flex items-center gap-6">
            <a href="trainer_dashboard.html" class="w-10 h-10 bg-[#2a2a2b] hover:bg-[#ff8c00] hover:text-black rounded-full flex items-center justify-center font-bold transition-all duration-300 shadow-md">
                ←
            </a>
            <div>
                <h1 class="text-2xl font-black uppercase tracking-widest italic text-white">Assign Program</h1>
                <p class="text-xs text-[#ff8c00] font-bold mt-1">Assigning to: <span class="text-gray-300">Liam Carter</span></p>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-8 scroll-custom">
        <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8 h-full">
            
            <div class="lg:col-span-1 flex flex-col h-full">
                <h2 class="text-[11px] text-gray-500 font-black uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-[#ff8c00]"></span> 1. Select Template
                </h2>
                
                <div class="space-y-4 overflow-y-auto pr-2 scroll-custom pb-10" id="template-options">
                    <button onclick="loadTemplate(this, 'Full Body Blast')" class="w-full bg-[#1f1f20] border-2 border-transparent p-6 rounded-2xl text-left hover:border-gray-600 transition-all duration-300 group shadow-lg">
                        <h3 class="text-xl font-black text-white group-hover:text-[#ff8c00] uppercase italic transition-colors">Full Body Blast</h3>
                        <p class="text-gray-400 text-sm mt-2 font-medium">4 Exercises • ~20 Min</p>
                    </button>

                    <button onclick="loadTemplate(this, 'Leg Day')" class="w-full bg-[#1f1f20] border-2 border-transparent p-6 rounded-2xl text-left hover:border-gray-600 transition-all duration-300 group shadow-lg">
                        <h3 class="text-xl font-black text-white group-hover:text-[#ff8c00] uppercase italic transition-colors">Leg Day</h3>
                        <p class="text-gray-400 text-sm mt-2 font-medium">3 Exercises • ~15 Min</p>
                    </button>
                    
                    <button onclick="loadTemplate(this, 'Cardio Burn')" class="w-full bg-[#1f1f20] border-2 border-transparent p-6 rounded-2xl text-left hover:border-gray-600 transition-all duration-300 group shadow-lg">
                        <h3 class="text-xl font-black text-white group-hover:text-[#ff8c00] uppercase italic transition-colors">Cardio Burn</h3>
                        <p class="text-gray-400 text-sm mt-2 font-medium">2 Exercises • ~30 Min</p>
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2 bg-[#181819] border border-gray-800 rounded-[2rem] p-8 flex flex-col shadow-2xl relative">
                
                <div class="flex justify-between items-center mb-6 border-b border-gray-800 pb-4">
                    <h2 class="text-[11px] text-gray-500 font-black uppercase tracking-[0.2em]">2. Program Preview</h2>
                    <span id="preview-badge" class="bg-gray-800 text-gray-400 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider">No Selection</span>
                </div>

                <div id="exercise-preview" class="flex-1 overflow-y-auto pr-4 scroll-custom space-y-3 mb-6">
                    <div class="h-full min-h-[300px] flex flex-col items-center justify-center text-gray-600 border-2 border-dashed border-gray-800 rounded-3xl p-10 transition-all">
                        <span class="text-5xl mb-4">📋</span>
                        <p class="font-bold text-lg">Select a template</p>
                        <p class="text-sm mt-1">to preview exercises here.</p>
                    </div>
                </div>

                <div class="mt-auto pt-4 flex justify-end">
                    <button id="assign-btn" onclick="assignToClient()" disabled class="bg-gray-800 text-gray-500 font-black px-12 py-5 rounded-2xl uppercase tracking-widest transition-all duration-300 cursor-not-allowed">
                        Confirm Assignment
                    </button>
                </div>

            </div>

        </div>
    </main>

    <script>
        // จำลองข้อมูล Database เหมือนเดิม
        const mockDatabase = {
            "Full Body Blast": [
                { name: "กระโดดตบ (Jumping Jacks)", detail: "20 ครั้ง / 3 เซ็ต" },
                { name: "วิดพื้น (Push-ups)", detail: "15 ครั้ง / 3 เซ็ต" },
                { name: "สควอท (Squats)", detail: "20 ครั้ง / 4 เซ็ต" },
                { name: "แพลงก์ (Plank)", detail: "60 วินาที / 3 เซ็ต" }
            ],
            "Leg Day": [
                { name: "สควอท (Squats)", detail: "20 ครั้ง / 4 เซ็ต" },
                { name: "ลันจ์ (Lunges)", detail: "15 ครั้ง / 3 เซ็ต (ต่อข้าง)" },
                { name: "กระโดดเชือก", detail: "3 นาที / อุปกรณ์: เชือก" }
            ],
            "Cardio Burn": [
                { name: "วิ่งบนลู่ (Treadmill)", detail: "20 นาที / ความเร็วปานกลาง" },
                { name: "ปั่นจักรยาน (Cycling)", detail: "10 นาที / ความหนืดระดับ 3" }
            ]
        };

        let currentSelectedTemplate = null;

        function loadTemplate(btnElement, templateName) {
            // 1. ไฮไลท์ปุ่มที่ถูกเลือก
            document.querySelectorAll('#template-options button').forEach(btn => {
                btn.classList.remove('template-active');
            });
            btnElement.classList.add('template-active');
            currentSelectedTemplate = templateName;

            // 2. อัปเดตป้าย Badge ด้านบนขวา
            const badge = document.getElementById('preview-badge');
            badge.innerText = `Previewing: ${templateName}`;
            badge.className = "bg-[#ff8c00]/20 text-[#ff8c00] border border-[#ff8c00]/50 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider";

            // 3. วาดรายการท่าออกกำลังกายใหม่
            const exercises = mockDatabase[templateName];
            const previewContainer = document.getElementById('exercise-preview');
            previewContainer.innerHTML = ''; // ล้างหน้าจอ

            exercises.forEach((ex, index) => {
                const item = document.createElement('div');
                item.className = "bg-[#1f1f20] p-5 rounded-2xl border border-gray-800 flex flex-col justify-center animate-in fade-in slide-in-from-bottom-2 hover:border-gray-600 transition-colors";
                item.style.animationDelay = `${index * 50}ms`; 
                item.innerHTML = `
                    <div class="flex justify-between items-start">
                        <span class="font-black text-white text-lg tracking-wide">${index + 1}. ${ex.name}</span>
                        <button class="text-gray-600 hover:text-red-500 transition text-[10px] uppercase font-bold mt-1">Remove</button>
                    </div>
                    <span class="text-sm text-[#ff8c00] font-bold mt-2">${ex.detail}</span>
                `;
                previewContainer.appendChild(item);
            });

            // 4. เปิดใช้งานปุ่ม Confirm ให้กดได้ (เปลี่ยนเป็นสีส้ม)
            const assignBtn = document.getElementById('assign-btn');
            assignBtn.disabled = false;
            assignBtn.className = "bg-[#ff8c00] text-black font-black px-12 py-5 rounded-2xl uppercase tracking-widest transition-all duration-300 hover:bg-white hover:scale-105 active:scale-95 shadow-[0_10px_20px_rgba(255,140,0,0.3)] cursor-pointer";
        }

        function assignToClient() {
            if(!currentSelectedTemplate) return;
            
            alert(`✅ จ่ายโปรแกรม "${currentSelectedTemplate}" ให้ลูกค้าเรียบร้อยแล้ว!`);
            
            // จ่ายเสร็จ เด้งไปหน้าให้เทรนเนอร์เริ่มงาน (ติ๊กถูก) เลย ตามที่คุณบอกไว้
            window.location.href = 'progress_tracker.html';
        }
    </script>
</body>
</html>
