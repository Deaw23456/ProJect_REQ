<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../src/style.css" rel="stylesheet">
    <title>Gym Hub - Set Up Trainer Profile</title>
</head>
<body class="bg-[#0a0a0b] text-white min-h-screen relative overflow-x-hidden font-sans selection:bg-[#ff8c00] selection:text-black">

    <div class="fixed inset-0 z-[-1] pointer-events-none overflow-hidden">
        <div class="absolute top-[-10%] -left-[10%] w-[600px] h-[600px] bg-[#ff8c00]/10 blur-[150px] rounded-full"></div>
        <div class="absolute bottom-[-10%] -right-[10%] w-[500px] h-[500px] bg-white/5 blur-[120px] rounded-full"></div>
    </div>

    <header class="p-6 absolute top-0 w-full z-50">
        <a href="/index.html" class="text-white text-3xl font-black flex items-center">
            Gym<div class="text-black bg-[#ff8c00] rounded-md px-1 ml-0.5">Hub</div>
        </a>
    </header>

    <main class="min-h-screen flex flex-col lg:flex-row items-center justify-center p-6 lg:p-12 gap-12 pt-24 lg:pt-0 max-w-7xl mx-auto">
        
        <div class="w-full lg:w-1/2 flex flex-col justify-center relative z-10 lg:pr-10">
            <div class="inline-flex items-center gap-2 border border-[#ff8c00]/50 bg-[#ff8c00]/10 text-[#ff8c00] px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest mb-6 w-max shadow-[0_0_10px_rgba(255,140,0,0.2)]">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Onboarding Step 2
            </div>
            
            <h1 class="text-5xl lg:text-7xl font-black italic uppercase tracking-tighter leading-[0.9] mb-6">
                Set Up Your <br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-[#ff8c00] to-yellow-500 drop-shadow-[0_0_15px_rgba(255,140,0,0.5)]">
                    Trainer Profile
                </span>
            </h1>
            
            <p class="text-gray-400 text-base lg:text-lg mb-10 max-w-md leading-relaxed">
                เข้าร่วมเครือข่ายโค้ชมืออาชีพของเรา กรอกข้อมูลเบื้องต้นให้ครบถ้วนเพื่อเตรียมพร้อมรับลูกค้าและสร้างรายได้ตั้งแต่วันนี้
            </p>

            <div class="flex items-center gap-4 bg-white/5 backdrop-blur-sm border border-white/10 p-3 rounded-2xl w-max">
                <div class="flex -space-x-3">
                    <img class="w-10 h-10 rounded-full border-2 border-[#121212] object-cover" src="https://images.unsplash.com/photo-1570295999919-56ceb5ecca61?w=100&h=100&fit=crop" alt="Trainer 1">
                    <img class="w-10 h-10 rounded-full border-2 border-[#121212] object-cover" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&h=100&fit=crop" alt="Trainer 2">
                    <img class="w-10 h-10 rounded-full border-2 border-[#121212] object-cover" src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=100&h=100&fit=crop" alt="Trainer 3">
                </div>
                <p class="text-xs font-bold text-gray-300">Joined by <span class="text-[#ff8c00]">2,000+</span> top trainers</p>
            </div>
        </div>

        <div class="w-full lg:w-1/2 max-w-lg relative z-10">
            <div class="bg-[#121214]/60 backdrop-blur-xl border border-white/10 rounded-[2.5rem] p-8 lg:p-10 shadow-[0_20px_50px_rgba(0,0,0,0.5)] relative overflow-hidden group">
                
                <div class="absolute inset-0 bg-gradient-to-tr from-transparent via-white/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-700 pointer-events-none"></div>

                <div class="flex flex-col items-center justify-center mb-8 relative">
                    <input type="file" id="profile-upload" class="hidden" accept="image/*" onchange="previewImage(this)">
                    <div id="upload-circle" onclick="document.getElementById('profile-upload').click()" class="w-28 h-28 rounded-full border-2 border-dashed border-[#ff8c00]/50 flex flex-col items-center justify-center cursor-pointer hover:border-[#ff8c00] hover:bg-[#ff8c00]/10 transition-all duration-300 relative overflow-hidden bg-black/40 shadow-inner group/img">
                        <svg class="w-8 h-8 text-[#ff8c00] mb-1 group-hover/img:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        <span class="text-[9px] font-black uppercase tracking-wider text-[#ff8c00]">Upload</span>
                        <img id="preview-img" src="" class="absolute inset-0 w-full h-full object-cover hidden" alt="Profile Preview">
                    </div>
                    <p class="text-[11px] text-gray-500 mt-3 font-medium">Drag & drop or click to upload.</p>
                </div>

                <div class="space-y-5">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] text-gray-400 font-black uppercase tracking-widest mb-1.5 ml-1">First Name</label>
                            <input type="text" placeholder="e.g. Marcus" class="w-full bg-black/30 border border-gray-700/50 rounded-xl px-4 py-3.5 text-white placeholder-gray-600 focus:outline-none focus:border-[#ff8c00] focus:bg-black/50 transition-all font-bold shadow-inner text-sm">
                        </div>
                        <div>
                            <label class="block text-[10px] text-gray-400 font-black uppercase tracking-widest mb-1.5 ml-1">Last Name</label>
                            <input type="text" placeholder="e.g. Aurelius" class="w-full bg-black/30 border border-gray-700/50 rounded-xl px-4 py-3.5 text-white placeholder-gray-600 focus:outline-none focus:border-[#ff8c00] focus:bg-black/50 transition-all font-bold shadow-inner text-sm">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] text-gray-400 font-black uppercase tracking-widest mb-1.5 ml-1">Phone Number</label>
                        <div class="relative">
                            <svg class="w-5 h-5 text-gray-500 absolute left-4 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                            <input type="tel" placeholder="+66 (0) 000-0000" class="w-full bg-black/30 border border-gray-700/50 rounded-xl pl-11 pr-4 py-3.5 text-white placeholder-gray-600 focus:outline-none focus:border-[#ff8c00] focus:bg-black/50 transition-all font-bold shadow-inner text-sm">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] text-gray-400 font-black uppercase tracking-widest mb-1.5 ml-1">Teaching Experience</label>
                        <select class="w-full bg-black/30 border border-gray-700/50 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-[#ff8c00] focus:bg-black/50 transition-all font-bold shadow-inner text-sm appearance-none cursor-pointer">
                            <option value="" disabled selected hidden>Select your experience level</option>
                            <option class="bg-[#121214] text-white" value="1">1 - 3 Years (Junior)</option>
                            <option class="bg-[#121214] text-white" value="2">3 - 5 Years (Pro)</option>
                            <option class="bg-[#121214] text-white" value="3">5+ Years (Master)</option>
                        </select>
                    </div>

                    <div>
                        <div class="flex justify-between items-end mb-1.5 ml-1">
                            <label class="block text-[10px] text-gray-400 font-black uppercase tracking-widest">Short Bio</label>
                            <span class="text-[9px] text-gray-600 font-bold uppercase tracking-widest">Max 250 Characters</span>
                        </div>
                        <textarea rows="3" placeholder="Tell us about your training style and specialties..." class="w-full bg-black/30 border border-gray-700/50 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-[#ff8c00] focus:bg-black/50 transition-all shadow-inner resize-none text-sm leading-relaxed"></textarea>
                    </div>
                </div>

                <button id="submit-btn" onclick="submitProfile()" class="mt-8 w-full bg-[#ff8c00] text-black font-black py-4 rounded-xl shadow-[0_0_20px_rgba(255,140,0,0.3)] hover:bg-white hover:shadow-[0_0_20px_rgba(255,255,255,0.4)] transition-all transform active:scale-95 uppercase tracking-widest flex items-center justify-center gap-2 group">
                    Continue to Verification
                    <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>

            </div>
        </div>

    </main>

    <script>
        // ฟังก์ชันพรีวิวรูปเมื่อกดอัปโหลด
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('preview-img');
                    img.src = e.target.result;
                    img.classList.remove('hidden'); 
                    
                    document.getElementById('upload-circle').classList.replace('border-dashed', 'border-solid');
                    document.getElementById('upload-circle').classList.replace('border-[#ff8c00]/50', 'border-[#ff8c00]');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 🎯 ฟังก์ชันตอนกด Submit (เซตให้เด้งไปหน้ายืนยันตัวตน)
        function submitProfile() {
            const btn = document.getElementById('submit-btn');
            
            // เปลี่ยนหน้าตาปุ่มเป็นกำลังโหลด
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-black" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 
                SAVING...
            `;
            btn.disabled = true;

            // จำลองการโหลดข้อมูล 1.5 วินาที แล้วเด้งไปหน้า trainer_verification.html
            setTimeout(() => {
                window.location.href = "trainer_verification.html";
            }, 1500);
        }
    </script>
</body>
</html>
