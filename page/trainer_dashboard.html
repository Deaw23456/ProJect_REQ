<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../src/style.css" rel="stylesheet">
    <title>Gym Hub - Trainer Dashboard</title>
</head>

<body class="bg-[#181819] text-white min-h-screen font-sans">
    <header class="border-b-2 border-amber-50 pb-4 mb-5">
        <nav class="flex items-center justify-between px-6 py-2">
            <!-- logo -->
            <div class="flex-shrink-0">
                <a href="index.html" class="text-white text-4xl font-bold flex">Gym<div
                        class="text-black bg-[#ff8c00] rounded-md px-1 ml-0.5">Hub</div></a>
            </div>
            </div>
            <!-- search_bar -->
            <div class="relative w-full max-w-md ml-auto flex items-center justify-end mr-5 hover:shadow-lg">
                <input type="search" name="search" id="search-input"
                    class="block w-full p-2 pr-10 text-white bg-[#2f2f2f] rounded-xl" placeholder="Search">
                <div class="absolute inset-y-0 right-0 flex items-center pr-3 cursor-pointer">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>

            <!-- login sign up admin -->
            <div id="guest-nav">
                <ul class="flex gap-2 font-bold">
                    <li><a href="/page/singup.html"
                            class="text-white hover:shadow-2xl shadow-[#ff8c00] border-2 border-[#ff8c00] rounded-md px-2 py-3">Sing
                            up</a></li>
                    <li><a href="/page/login.html"
                            class="text-white hover:shadow-2xl shadow-[#ff8c00] border-2 border-[#ff8c00] rounded-md px-5 py-3">Login</a>
                    </li>
                </ul>
            </div>
            <div id="user-nav"
                class="hidden relative border-2 border-[#ff8c00] rounded-md px-4 py-2 items-center gap-2 transition-all duration-300 cursor-pointer hover:scale-105 hover:shadow-xl hover:shadow-[#ff8c00]/20">
                <div class="flex items-center gap-2.5">
                    <img id="nav-profile-img" src="/img/Image-11 สำเนา.jpg" alt="User"
                        class="w-8 h-8 rounded-full object-cover border-2 border-[#ff8c00]">
                    <button id="profile-btn" type="button" title="Profile menu" class="flex items-center gap-2 text-white font-bold">
                        <span id="username-display"></span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7">
                            </path>
                        </svg>
                    </button>
                    <div id="dropdown-menu"
                        class="hidden absolute right-0 top-full mt-2 w-48 bg-[#2d2d2f] rounded-md shadow-lg py-1 z-20 border border-[#4c4c4c]">
                        <a href="/page/main_profile.html"
                            class="block px-4 py-2 text-sm text-white hover:bg-[#ff8c00] hover:text-black transition-colors duration-300">My
                            Profile</a>
                        <a href="#" id="logout-btn"
                            class="block px-4 py-2 text-sm text-white hover:bg-[#ff8c00] hover:text-black transition-colors duration-300">Logout</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="grid grid-cols-1 lg:grid-cols-4 gap-8 p-3">

        <div class="lg:col-span-3 space-y-8">
            <h1 class="text-2xl font-bold">Hello, Trainer</h1>

            <section class="bg-[#1f1f20] border-2 border-orange-500/30 rounded-2xl p-6 cursor-pointer transition-all duration-200 hover:scale-104">
                <h2 class="text-lg font-semibold mb-4 text-gray-300">Today's Agenda</h2>
                <div id="agenda-container"
                    class="flex flex-col items-center justify-center py-10 border-2 border-dashed border-gray-700 rounded-xl">
                    <p class="text-xl text-orange-500 font-bold uppercase tracking-widest">Available</p>
                    <p class="text-gray-500 text-sm mt-2">คุณยังไม่มีคิวสอนสำหรับวันนี้</p>
                </div>
            </section>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <button onclick="window.location.href='manage_program.html'"
                    class="group bg-[#1f1f20] p-6 rounded-2xl border border-gray-800 hover:border-[#ff8c00] transition-all text-left">
                    <div class="text-2xl mb-2">📋</div>
                    <h3 class="font-bold group-hover:text-orange-500">Manage Program</h3>
                    <p class="text-xs text-gray-500 mt-1">สร้างคอร์สให้ลูกค้า</p>
                </button>

                <button onclick="window.location.href='availability.html'"
                    class="group bg-[#1f1f20] p-6 rounded-2xl border border-gray-800 hover:border-[#ff8c00] transition-all text-left">
                    <div class="text-2xl mb-2">📅</div>
                    <h3 class="font-bold group-hover:text-orange-500">Availability</h3>
                    <p class="text-xs text-gray-500 mt-1">ตั้งค่าเวลาว่างของคุณ</p>
                </button>

                <button onclick="window.location.href='client_management.html'"
                    class="group bg-[#1f1f20] p-6 rounded-2xl border border-gray-800 hover:border-[#ff8c00] transition-all text-left">
                    <div class="text-2xl mb-2">👥</div>
                    <h3 class="font-bold group-hover:text-orange-500">Client Management</h3>
                    <p class="text-xs text-gray-500 mt-1">จัดการรายชื่อสมาชิก</p>
                </button>
            </div>
        </div>

        <aside class="bg-[#1f1f20] p-6 rounded-2xl border border-gray-800 h-fit">
            <h3 class="font-bold mb-6 flex justify-between items-center">
                Pending Actions
                <span class="bg-red-500 text-[10px] px-2 py-0.5 rounded-full">2 New</span>
            </h3>
            <div class="space-y-4">
                <div class="bg-[#2a2a2b] p-3 rounded-lg flex justify-between items-center duration-200 cursor-pointer hover:border-2 border-[#ff8c00]">
                    <div>
                        <p class="text-sm font-bold">Liam Carter</p>
                        <p class="text-[10px] text-gray-400">New Booking</p>
                    </div>
                    <button class="text-[10px] bg-orange-500 px-2 py-1 rounded cursor-pointer transition-all duration-300 hover: scale-110">Approve</button>
                </div>
                <div class="bg-[#2a2a2b] p-3 rounded-lg flex justify-between items-center duration-200 cursor-pointer hover:border-2 border-[#ff8c00]">
                    <div>
                        <p class="text-sm font-bold">Olivia Bennett</p>
                        <p class="text-[10px] text-gray-400">New Booking</p>
                    </div>
                    <button class="text-[10px] bg-orange-500 px-2 py-1 rounded cursor-pointer transition-all duration-300 hover: scale-110">Approve</button>
                </div>
            </div>
        </aside>

    </main>

    <script type="module" src="../dist/js/trainer_dashboard.js"></script>
</body>

</html>
