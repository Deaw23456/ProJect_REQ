<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../src/style.css" rel="stylesheet">
    <title>Trainer Dashboard</title>
</head>

<body class="bg-[#0a0a0b] text-white min-h-screen font-sans relative overflow-x-hidden">

    <div class="fixed inset-0 z-[-1] pointer-events-none overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-[#ff8c00]/10 blur-[120px] rounded-full">
        </div>
        <div class="absolute bottom-[-10%] right-[-5%] w-[400px] h-[400px] bg-[#ff8c00]/10 blur-[100px] rounded-full">
        </div>
        <div class="absolute top-[40%] left-[50%] w-[300px] h-[300px] bg-white/5 blur-[80px] rounded-full"></div>
    </div>

    <header class="bg-white/5 backdrop-blur-md border-b border-white/10 pb-4 mb-5 sticky top-0 z-50">
        <nav class="flex flex-wrap items-center justify-between gap-3 px-4 sm:px-6 py-2">
            <div class="flex-shrink-0">
                <a href="./trainer_profile.html" class="text-white text-4xl font-bold flex mt-2">Gym<div
                        class="text-black bg-[#ff8c00] rounded-md px-1 ml-0.5">Hub</div></a>
            </div>

            <div class="relative w-full max-w-md ml-auto flex items-center justify-end mr-0 sm:mr-5">
                <input type="search" name="search" id="search-input"
                    class="block w-full p-2 pr-10 text-white bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:border-[#ff8c00]/50 focus:bg-white/10 transition-all backdrop-blur-sm"
                    placeholder="Search">
                <div class="absolute inset-y-0 right-0 flex items-center pr-3 cursor-pointer">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>

            <div id="guest-nav">
                <ul class="flex gap-2 font-bold mt-2">
                    <li><a href="./singup.html"
                            class="text-white hover:bg-[#ff8c00] hover:text-black border border-[#ff8c00] rounded-lg px-4 py-2 transition-all shadow-[0_0_10px_rgba(255,140,0,0.2)]">Sign
                            up</a></li>
                    <li><a href="./login.html"
                            class="text-black bg-[#ff8c00] hover:bg-white hover:shadow-[0_0_15px_rgba(255,255,255,0.4)] rounded-lg px-6 py-2 transition-all">Login</a>
                    </li>
                </ul>
            </div>

            <div id="user-nav"
                class="hidden relative bg-white/5 backdrop-blur-md border border-[#ff8c00]/50 rounded-xl px-4 py-2 items-center gap-2 transition-all duration-300 cursor-pointer hover:scale-105 hover:bg-white/10 hover:shadow-[0_0_15px_rgba(255,140,0,0.3)] mt-2">
                <div class="flex items-center gap-2.5">
                    <img id="nav-profile-img" src="../img/Image-11 สำเนา.jpg" alt="User"
                        class="w-8 h-8 rounded-full object-cover border-2 border-[#ff8c00]">
                    <button id="profile-btn" type="button" class="flex items-center gap-2 text-white font-bold">
                        <span id="username-display"></span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7">
                            </path>
                        </svg>
                    </button>
                    <div id="dropdown-menu"
                        class="hidden absolute right-0 top-full mt-3 w-48 bg-[#1a1a1c]/90 backdrop-blur-xl border border-white/10 rounded-xl shadow-2xl py-2 z-20">
                        <a href="./main_profile.html"
                            class="block px-4 py-2 text-sm text-white hover:bg-[#ff8c00] hover:text-black transition-colors">My
                            Profile</a>
                        <a href="/index.html" id="logout-btn"
                            class="block px-4 py-2 text-sm text-red-400 hover:bg-red-500 hover:text-white transition-colors">Logout</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="grid grid-cols-1 lg:grid-cols-4 gap-6 sm:gap-8 p-4 sm:p-6 max-w-7xl mx-auto z-10 relative">

        <div class="lg:col-span-3 space-y-8">
            <h1 class="text-3xl font-black italic tracking-tight">Hello, Trainer <span class="text-[#ff8c00]">!</span>
            </h1>

            <section
                class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-8 cursor-pointer transition-all duration-300 hover:-translate-y-1 hover:shadow-[0_10px_30px_rgba(255,140,0,0.15)] hover:border-[#ff8c00]/50 group">
                <h2 class="text-lg font-bold mb-6 text-gray-200 uppercase tracking-widest flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-[#ff8c00] animate-pulse"></span> Today's Agenda
                </h2>
                <div id="agenda-container"
                    class="relative flex items-center gap-6 p-6 bg-white/5 border border-white/10 rounded-2xl group-hover:border-[#ff8c00]/50 transition-colors shadow-lg overflow-hidden">
                   
                    <div class="absolute top-1/2 left-10 -translate-y-1/2 w-24 h-24 bg-[#ff8c00]/30 blur-2xl rounded-full pointer-events-none"></div>
 
                    <div class="w-20 h-20 rounded-full border-2 border-[#ff8c00] p-1 shadow-[0_0_15px_rgba(255,140,0,0.4)] shrink-0 z-10 bg-[#121212]">
                        <img src="../img/pho_member.png" alt="Client" class="w-full h-full rounded-full object-cover">
                    </div>
 
                    <div class="flex-1 z-10">
                        <p class="text-[10px] text-[#ff8c00] font-black uppercase tracking-widest mb-1">10:00 AM - 11:00 AM</p>
                        <h3 class="text-2xl font-black text-white tracking-wide">Ballkhonlhor_02</h3>
                        <p class="text-sm text-gray-400 mt-1">Goal: Fat Loss • Level: Beginner</p>
                    </div>
 
                    <div class="shrink-0 z-10">
                        <button onclick="window.location.href='assign_program.html'"
                            class="bg-[#ff8c00] text-black font-black px-6 py-3 rounded-xl shadow-[0_0_15px_rgba(255,140,0,0.3)] hover:bg-white hover:shadow-[0_0_20px_rgba(255,255,255,0.5)] transition-all transform hover:scale-105 active:scale-95 uppercase tracking-wide text-sm flex items-center gap-2">
                            Next <span>→</span>
                        </button>
                    </div>
                </div>
            </section>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <button onclick="window.location.href='manage_program.html'"
                    class="group bg-white/5 backdrop-blur-md p-6 rounded-3xl border border-white/10 hover:bg-white/10 hover:border-[#ff8c00] hover:shadow-[0_10px_20px_rgba(255,140,0,0.1)] transition-all duration-300 text-left hover:-translate-y-1">
                    <div class="text-3xl mb-4 group-hover:scale-110 transition-transform origin-left">📋</div>
                    <h3 class="font-black text-lg text-gray-200 group-hover:text-[#ff8c00] transition-colors">Manage
                        Program</h3>
                    <p class="text-xs text-gray-400 mt-2">สร้างคอร์สให้ลูกค้า</p>
                </button>

                <button onclick="window.location.href='availability.html'"
                    class="group bg-white/5 backdrop-blur-md p-6 rounded-3xl border border-white/10 hover:bg-white/10 hover:border-[#ff8c00] hover:shadow-[0_10px_20px_rgba(255,140,0,0.1)] transition-all duration-300 text-left hover:-translate-y-1">
                    <div class="text-3xl mb-4 group-hover:scale-110 transition-transform origin-left">📅</div>
                    <h3 class="font-black text-lg text-gray-200 group-hover:text-[#ff8c00] transition-colors">
                        Availability</h3>
                    <p class="text-xs text-gray-400 mt-2">ตั้งค่าเวลาว่างของคุณ</p>
                </button>

                <button onclick="window.location.href='client_management.html'"
                    class="group bg-white/5 backdrop-blur-md p-6 rounded-3xl border border-white/10 hover:bg-white/10 hover:border-[#ff8c00] hover:shadow-[0_10px_20px_rgba(255,140,0,0.1)] transition-all duration-300 text-left hover:-translate-y-1">
                    <div class="text-3xl mb-4 group-hover:scale-110 transition-transform origin-left">👥</div>
                    <h3 class="font-black text-lg text-gray-200 group-hover:text-[#ff8c00] transition-colors">Clients
                    </h3>
                    <p class="text-xs text-gray-400 mt-2">จัดการรายชื่อสมาชิก</p>
                </button>
            </div>
        </div>

        <aside
            class="bg-white/5 backdrop-blur-xl p-6 rounded-3xl border border-white/10 h-fit shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-[#ff8c00]/10 blur-3xl rounded-full pointer-events-none">
            </div>

            <h3 class="font-black mb-8 flex justify-between items-center text-lg">
                Pending Actions
                <span id="pending-count"
                    class="bg-red-500/20 text-red-500 border border-red-500/50 text-xs px-3 py-1 rounded-full animate-pulse">0
                    New</span>
            </h3>

            <div id="member-list-container" class="space-y-4">
                <!-- member cards will be injected here by JS -->
            </div>
            <p id="no-members-msg" class="text-gray-500 text-sm text-center py-4">ยังไม่มี member ที่รอการอนุมัติ</p>

        </aside>

    </main>

    <script src="../dist/js/helpers.js"></script>
    <script src="../dist/js/nav.js"></script>
    <script type="module" src="../dist/js/trainer_dashboard.js"></script>

</body>

</html>
