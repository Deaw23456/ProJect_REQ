<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../src/style.css" rel="stylesheet">
    <title>Trainer</title>
</head>

<body class="bg-[#0a0a0b] text-white font-sans min-h-screen">
    <div class="fixed inset-0 z-[-1] pointer-events-none overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-[#ff8c00]/10 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-5%] w-[400px] h-[400px] bg-[#ff8c00]/10 blur-[100px] rounded-full"></div>
        <div class="absolute top-[40%] left-[50%] w-[300px] h-[300px] bg-white/5 blur-[80px] rounded-full"></div>
    </div>

    <header class="bg-white/5 backdrop-blur-md border-b border-white/10 pb-4 mb-5 sticky top-0 z-50">
        <nav class="flex flex-wrap items-center justify-between gap-3 px-4 sm:px-6 py-2">
            <div class="flex-shrink-0">
                <a href="/index.html" class="text-white text-4xl font-bold flex mt-2">Gym<div
                        class="text-black bg-[#ff8c00] rounded-md px-1 ml-0.5">Hub</div></a>
            </div>

            <div class="relative w-full max-w-md ml-auto flex items-center justify-end mr-0 sm:mr-5">
                <input type="search" name="search" id="search-input"
                    class="block w-full p-2 pr-10 text-white bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:border-[#ff8c00]/50 focus:bg-white/10 transition-all backdrop-blur-sm"
                    placeholder="Search">
                <div class="absolute inset-y-0 right-0 flex items-center pr-3 cursor-pointer">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>

            <div id="guest-nav">
                <ul class="flex gap-2 font-bold mt-2">
                    <li><a href="./singup.html"
                            class="text-white hover:bg-[#ff8c00] hover:text-black border border-[#ff8c00] rounded-lg px-4 py-2 transition-all shadow-[0_0_10px_rgba(255,140,0,0.2)]">Sign
                            up</a></li>
                    <li><a href="./login.html"
                            class="text-black bg-[#ff8c00] hover:bg-white hover:shadow-[0_0_15px_rgba(255,255,255,0.4)] rounded-lg px-6 py-2 transition-all">Login</a>
                    </li>
                </ul>
            </div>

            <div id="user-nav"
                class="hidden relative bg-white/5 backdrop-blur-md border border-[#ff8c00]/50 rounded-xl px-4 py-2 items-center gap-2 transition-all duration-300 cursor-pointer hover:scale-105 hover:bg-white/10 hover:shadow-[0_0_15px_rgba(255,140,0,0.3)] mt-2">
                <div class="flex items-center gap-2.5">
                    <img id="nav-profile-img" src="../img/Image-11 สำเนา.jpg" alt="User"
                        class="w-8 h-8 rounded-full object-cover border-2 border-[#ff8c00]">
                    <button id="profile-btn" type="button" class="flex items-center gap-2 text-white font-bold">
                        <span id="username-display"></span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7">
                            </path>
                        </svg>
                    </button>
                    <div id="dropdown-menu"
                        class="hidden absolute right-0 top-full mt-3 w-48 bg-[#1a1a1c]/90 backdrop-blur-xl border border-white/10 rounded-xl shadow-2xl py-2 z-20">
                        <a href="./main_profile.html"
                            class="block px-4 py-2 text-sm text-white hover:bg-[#ff8c00] hover:text-black transition-colors">My
                            Profile</a>
                        <a href="/index.html" id="logout-btn"
                            class="block px-4 py-2 text-sm text-red-400 hover:bg-red-500 hover:text-white transition-colors">Logout</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main class="flex-1 overflow-y-auto pr-2 scroll-custom pb-10">
        <div class="relative w-full h-72 rounded-[2rem] overflow-hidden mb-[-90px] border border-white/10 shadow-2xl">
            <img id="profileBgImg" src="../img/gym hub-2 สำเนา.png" alt="Background" class="w-full h-full object-cover brightness-75">
            <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0b] via-[#0a0a0b]/40 to-transparent"></div>
        </div>

        <div class="max-w-7xl mx-auto w-full">
            <div class="relative flex items-end gap-6 px-10">
                <div class="w-44 h-44 rounded-full border-4 border-[#ff8c00] bg-[#181819] p-1.5 overflow-hidden shadow-[0_0_30px_rgba(255,140,0,0.3)]">
                    <img id="profileImg" src="../img/Image-11 สำเนา.jpg" alt="Profile" class="w-full h-full object-cover rounded-full">
                </div>
                <div class="mb-4">
                    <h1 id="Profile_Username" class="text-5xl font-black italic uppercase tracking-tighter drop-shadow-lg">Your Profile</h1>
                    <div class="flex items-center gap-3 mt-2">
                        <p id="Profile_Position" class="text-lg font-bold text-[#ff8c00] tracking-widest uppercase">N/A</p>
                        <a href="./RateLaka.html" class="bg-[#ff8c00] px-6 py-2 rounded-2xl cursor-pointer transition-all duration-300 hover:text-black text-sm font-bold"><button class="cursor-pointer">Book Now +</button></a>
                    </div>
                </div>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 max-w-7xl p-4 mt-12">
                <div class="lg:col-span-8 space-y-6">
                    <!-- About Section -->
                    <section id="Profile_Content" class="bg-[#151517] border border-gray-800 rounded-[2.5rem] p-10 shadow-xl">
                        <div class="flex justify-between items-center mb-8 pb-4 border-b border-gray-800">
                            <h2 class="text-xl font-black text-white uppercase tracking-widest flex items-center gap-3">
                                <span class="w-2 h-8 bg-[#ff8c00] rounded-full"></span>
                                About Me
                            </h2>
                            <span id="Posi_update" class="font-bold bg-[#ff8c00]/10 border border-[#ff8c00]/30 text-[#ff8c00] px-4 py-1.5 rounded-full text-xs uppercase tracking-widest">-</span>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-6">
                            <div class="flex flex-col">
                                <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Username</span>
                                <span id="Show_Username" class="font-bold text-lg text-white">-</span>
                            </div>
                            <div class="flex flex-col">
                                <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Full Name</span>
                                <span id="Show_Fullname" class="font-bold text-lg text-white">-</span>
                            </div>
                            <div class="flex flex-col">
                                <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Email</span>
                                <span id="Show_Email" class="font-bold text-white">-</span>
                            </div>
                            <div class="flex flex-col">
                                <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Phone</span>
                                <span id="Show_Phone" class="font-bold text-[#ff8c00]">-</span>
                            </div>
                            <div class="md:col-span-2 grid grid-cols-3 gap-4 mt-4 bg-black/30 p-6 rounded-2xl border border-gray-800/50">
                                <div class="flex flex-col items-center justify-center border-r border-gray-800">
                                    <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Age</span>
                                    <span id="Show_Age" class="font-black text-2xl text-white">-</span>
                                </div>
                                <div class="flex flex-col items-center justify-center border-r border-gray-800">
                                    <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Weight</span>
                                    <span id="Show_Weight" class="font-black text-2xl text-white">- <span class="text-sm text-gray-500 font-bold">kg</span></span>
                                </div>
                                <div class="flex flex-col items-center justify-center">
                                    <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Height</span>
                                    <span id="Show_Height" class="font-black text-2xl text-white">- <span class="text-sm text-gray-500 font-bold">cm</span></span>
                                </div>
                            </div>
                            <div class="flex flex-col md:col-span-2 mt-2">
                                <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Gender</span>
                                <span id="Show_Gender" class="font-bold text-white">-</span>
                            </div>
                            <div class="flex flex-col md:col-span-2">
                                <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Position</span>
                                <span id="Show_Position" class="font-bold text-[#ff8c00]">-</span>
                            </div>
                        </div>
                    </section>

                    <section id="my-work" class="bg-[#151517] border border-gray-800 rounded-[2.5rem] p-10 shadow-xl">
                        <h2 class="text-xl font-black text-white uppercase tracking-widest flex items-center gap-3 mb-6">
                            <span class="w-2 h-8 bg-[#ff8c00] rounded-full"></span>
                            My Work
                        </h2>
                        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                            <!-- Placeholder for work images -->
                            <div class="bg-black/20 border border-gray-800 h-48 rounded-2xl flex items-center justify-center text-gray-500">Work 1</div>
                            <div class="bg-black/20 border border-gray-800 h-48 rounded-2xl flex items-center justify-center text-gray-500">Work 2</div>
                            <div class="bg-black/20 border border-gray-800 h-48 rounded-2xl flex items-center justify-center text-gray-500">Work 3</div>
                            <div class="bg-black/20 border border-gray-800 h-48 rounded-2xl flex items-center justify-center text-gray-500">Work 4</div>
                        </div>
                    </section>
                    <section id="review-section" class="bg-[#151517] border border-gray-800 rounded-[2.5rem] p-10 shadow-xl">
                        <h2 class="text-xl font-black text-white uppercase tracking-widest flex items-center gap-3 mb-6">
                            <span class="w-2 h-8 bg-[#ff8c00] rounded-full"></span>
                            Review
                        </h2>
                        <div class="max-w-5xl mx-auto p-6 bg-black/20 border border-gray-800 rounded-2xl text-white">
                            <h2 class="text-xl font-bold mb-4 text-[#ff8c00]">Review & Comment</h2>
                            <div class="flex items-center mb-4">
                                <div id="star-rating" class="flex space-x-1">
                                    <button class="star text-3xl text-gray-400 hover:text-yellow-400 transition"
                                        data-value="1">★</button>
                                    <button class="star text-3xl text-gray-400 hover:text-yellow-400 transition"
                                        data-value="2">★</button>
                                    <button class="star text-3xl text-gray-400 hover:text-yellow-400 transition"
                                        data-value="3">★</button>
                                    <button class="star text-3xl text-gray-400 hover:text-yellow-400 transition"
                                        data-value="4">★</button>
                                    <button class="star text-3xl text-gray-400 hover:text-yellow-400 transition"
                                        data-value="5">★</button>
                                </div>
                                <span id="rating-value" class="ml-3 text-gray-400">0/5</span>
                            </div>

                            <textarea id="review-text"
                                class="w-full p-3 bg-black/30 border border-gray-700/50 rounded-md focus:outline-none focus:ring-1 focus:ring-[#ff8c00] focus:border-[#ff8c00] text-sm placeholder-gray-400 transition"
                                placeholder="แสดงความคิดเห็นของคุณ..." rows="3"></textarea>

                            <button id="submit-review"
                                class="w-full mt-4 bg-[#ff8c00] text-black font-bold py-2 rounded-md hover:bg-[#e67e00] transition">
                                Post Review
                            </button>

                            <hr class="my-6 border-gray-800">

                            <div id="review-list" class="space-y-4">
                            </div>
                        </div>
                    </section>
                </div>

                <aside class="lg:col-span-4 space-y-4">
                    <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-5 shadow-xl">
                        <h3 class="text-[#ff8c00] font-bold mb-4 flex items-center">
                            <span class="mr-2">🔥</span> สมาชิกที่น่าสนใจ
                        </h3>

                        <div id="mini-profile-list" class="space-y-4">
                        </div>

                        <button class="w-full mt-4 text-xs text-gray-400 hover:text-[#ff8c00] transition text-center">
                            ดูทั้งหมด
                        </button>
                    </div>
                </aside>
            </div>
        </div>
    </main>
    <style>
        .scroll-custom::-webkit-scrollbar { width: 5px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .scroll-custom:hover::-webkit-scrollbar-thumb { background: #ff8c00; }
    </style>
    <script src="../dist/js/helpers.js"></script>
    <script src="../dist/js/nav.js"></script>
    <script src="../dist/js/view_profile.js"></script>
</body>

</html>
