<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../src/style.css" rel="stylesheet">
    <title>Document</title>
</head>

<body class="bg-[#181819]">
    <header class="border-b-2 border-amber-50 pb-4">
        <nav class="flex items-center justify-between px-6 py-2">
            <!-- logo -->
            <div class="flex-shrink-0">
                <a href="index.html" class="text-white text-4xl font-bold flex">Gym<div
                        class="text-black bg-[#ff8c00] rounded-md px-1 ml-0.5">Hub</div></a>
            </div>
            </div>
            <!-- search_bar -->
            <div class="relative w-full max-w-md ml-auto flex items-center justify-end mr-5 hover:shadow-lg">
                <input type="search" name="search" id="search-input"
                    class="block w-full p-2 pr-10 text-white bg-[#2f2f2f] rounded-xl" placeholder="Search">
                <div class="absolute inset-y-0 right-0 flex items-center pr-3 cursor-pointer">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>

            <!-- login sign up admin -->
            <div id="guest-nav">
                <ul class="flex gap-2 font-bold">
                    <li><a href="/page/singup.html"
                            class="text-white hover:shadow-2xl shadow-[#ff8c00] border-2 border-[#ff8c00] rounded-md px-2 py-3">Sing
                            up</a></li>
                    <li><a href="/page/login.html"
                            class="text-white hover:shadow-2xl shadow-[#ff8c00] border-2 border-[#ff8c00] rounded-md px-5 py-3">Login</a>
                    </li>
                </ul>
            </div>
            <div id="user-nav"
                class="hidden relative border-2 border-[#ff8c00] rounded-md px-4 py-2 items-center gap-2 transition-all duration-300 cursor-pointer hover:scale-105 hover:shadow-xl hover:shadow-[#ff8c00]/20">
                <div class="flex items-center gap-2.5">
                    <img id="nav-profile-img" src="/img/Image-11 สำเนา.jpg" alt="User"
                        class="w-8 h-8 rounded-full object-cover border-2 border-[#ff8c00]">
                    <button id="profile-btn" type="button" title="Profile menu" class="flex items-center gap-2 text-white font-bold">
                        <span id="username-display"></span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7">
                            </path>
                        </svg>
                    </button>
                    <div id="dropdown-menu"
                        class="hidden absolute right-0 top-full mt-2 w-48 bg-[#2d2d2f] rounded-md shadow-lg py-1 z-20 border border-[#4c4c4c]">
                        <a href="/page/main_profile.html"
                            class="block px-4 py-2 text-sm text-white hover:bg-[#ff8c00] hover:text-black transition-colors duration-300">My
                            Profile</a>
                        <a href="#" id="logout-btn"
                            class="block px-4 py-2 text-sm text-white hover:bg-[#ff8c00] hover:text-black transition-colors duration-300">Logout</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <!-- slider_img -->
        <div id="slider"
            class="flex overflow-x-auto snap-x snap-mandatory scroll-smooth border-0 rounded-2xl mx-5 mt-10">
            <div class="snap-center shrink-0 w-full h-96">
                <img src="/img/gym hub-2 สำเนา.png" alt="Slide 1" class="w-full h-full object-cover">
            </div>
            <div class="snap-center shrink-0 w-full h-96">
                <img src="/img/gym hub-5 สำเนา.png" alt="Slide 2" class="w-full h-full object-cover">
            </div>
            <div class="snap-center shrink-0 w-full h-96">
                <img src="/img/gym hub-3 สำเนา.png" alt="Slide 3" class="w-full h-full object-cover">
            </div>
            <div class="snap-center shrink-0 w-full h-96">
                <img src="/img/gym hub-1 สำเนา.png" alt="Slide 4" class="w-full h-full object-cover">
            </div>
            <div class="snap-center shrink-0 w-full h-96">
                <img src="/img/gym hub-4 สำเนา.png" alt="Slide 5" class="w-full h-full object-cover">
            </div>
        </div>
        <!-- filter -->
        <div class="flex mt-10">
            <aside class="w-60 bg-[#181819] p-4 rounded-lg border-2 border-[#ff8c00] mt-10 ml-5">
                <h2 class="font-bold text-xl mb-4 text-white">Filters</h2>
                <!-- Specialty -->
                <div class="mb-10">
                    <h2 class="font-bold text-xl mb-4 text-white">Specialty</h2>
                    <div class="flex flex-col gap-2">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-4 h-4 accent-[#ff8c00]">
                            <span class="text-gray-400">Cardio</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-4 h-4 accent-[#ff8c00]">
                            <span class="text-gray-400">Weight Lifting</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-4 h-4 accent-[#ff8c00]">
                            <span class="text-gray-400">Yoga</span>
                        </label>
                    </div>
                </div>
                <!-- Gender -->
                <div class="mb-10">
                    <h2 class="font-bold text-xl mb-4 text-white">Gender</h2>
                    <div class="flex flex-col gap-2">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-4 h-4 accent-[#ff8c00]">
                            <span class="text-gray-400">Male</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-4 h-4 accent-[#ff8c00]">
                            <span class="text-gray-400">Female</span>
                        </label>
                    </div>
                </div>
                <div class="mb-10">
                    <h2 class="font-bold text-xl mb-4 text-white">Location</h2>
                    <div class="flex flex-col gap-2">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-4 h-4 accent-[#ff8c00]">
                            <span class="text-gray-400">Bangkok</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-4 h-4 accent-[#ff8c00]">
                            <span class="text-gray-400">Chiang Mai</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-4 h-4 accent-[#ff8c00]">
                            <span class="text-gray-400">Phuket</span>
                        </label>
                    </div>
                </div>
                <div class="mb-10">
                    <h2 class="font-bold text-xl mb-4 text-white">Price Range</h2>
                    <div class="flex flex-col gap-2">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-4 h-4 accent-[#ff8c00]">
                            <span class="text-gray-400">0 - 1000 THB</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-4 h-4 accent-[#ff8c00]">
                            <span class="text-gray-400">1000 - 3000 THB</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-4 h-4 accent-[#ff8c00]">
                            <span class="text-gray-400">3000 - 5000 THB</span>
                        </label>
                    </div>
                </div>
                <div><input type="submit" value="Apply Filters"
                        class="bg-[#ff8c00] text-white px-4 py-2 rounded-md hover:bg-[#ff6a00] transition-colors duration-300">
                </div>
            </aside>
            <section class="flex gap-4 mx-5 flex-wrap justify-center">
                <div id="trainer-cards-container" class="flex gap-4 mx-5 flex-wrap justify-center">

                </div>
            </section>
        </div>
    </main>
    <script src="dist/js/helpers.js"></script>
    <script src="dist/js/nav.js"></script>
    <script src="dist/js/index.js"></script>
</body>

</html>
